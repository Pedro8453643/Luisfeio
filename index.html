<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ FUTLOCO — Futebol 1v1 Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=Poppins:wght@600;700;800&display=swap');

:root {
  --primary: #00ff88;
  --primary-dark: #00cc6a;
  --secondary: #ff3366;
  --dark-bg: #0a0c0f;
  --card-bg: #12161c;
  --text: #ffffff;
  --text-muted: #8a8f99;
  --border: #1e242c;
  --grass-dark: #0b2f1a;
  --grass-light: #0e3a1f;
  --yellow: #ffd93d;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, var(--dark-bg) 0%, #0e1117 100%);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow: hidden;
}

/* Lobby Moderno */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  min-height: 100vh;
  padding: 2rem;
  animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  text-align: center;
  margin-bottom: 1rem;
}

.logo h1 {
  font-family: 'Poppins', sans-serif;
  font-size: clamp(4rem, 12vw, 6rem);
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary) 0%, var(--yellow) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.02em;
  text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
}

.logo p {
  font-size: 1rem;
  letter-spacing: 0.5em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 0.5rem;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2rem;
  width: min(440px, 90vw);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.card-title {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--primary);
  margin-bottom: 1.5rem;
  font-weight: 600;
}

.field-group {
  margin-bottom: 1.5rem;
}

.field-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.field-group input {
  width: 100%;
  background: #1a1f26;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.9rem 1rem;
  color: var(--text);
  font-size: 1rem;
  font-family: 'Inter', monospace;
  transition: all 0.3s ease;
}

.field-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
}

.color-pick {
  display: flex;
  gap: 0.8rem;
  margin-top: 0.5rem;
}

.color-swatch {
  width: 45px;
  height: 45px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 2px solid transparent;
}

.color-swatch:hover {
  transform: scale(1.1);
}

.color-swatch.active {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.3);
  transform: scale(1.05);
}

.btn {
  width: 100%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border: none;
  border-radius: 12px;
  padding: 1rem;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--dark-bg);
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0, 255, 136, 0.3);
}

.btn-secondary {
  background: linear-gradient(135deg, #2a2f38 0%, #1e242c 100%);
  color: var(--text);
}

.divider {
  text-align: center;
  margin: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.85rem;
  position: relative;
}

.divider::before,
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}

.divider::before {
  left: 0;
}

.divider::after {
  right: 0;
}

.room-code-display {
  font-family: monospace;
  font-size: 3rem;
  letter-spacing: 0.5em;
  text-align: center;
  background: linear-gradient(135deg, var(--primary), var(--yellow));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 800;
  margin: 1rem 0;
}

/* Game Area */
#game {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1rem;
}

.scoreboard-modern {
  width: min(820px, 96vw);
  background: rgba(18, 22, 28, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
}

.player-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
}

.score-value {
  font-family: 'Poppins', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--yellow));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.game-clock {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--yellow);
  background: rgba(0, 0, 0, 0.5);
  padding: 0.25rem 1rem;
  border-radius: 30px;
}

#canvas-wrap {
  position: relative;
  width: min(820px, 96vw);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
}

canvas#gc {
  display: block;
  width: 100%;
  background: linear-gradient(145deg, var(--grass-dark), var(--grass-light));
  cursor: none;
}

.controls-hint {
  width: min(820px, 96vw);
  background: rgba(18, 22, 28, 0.9);
  border-radius: 12px;
  padding: 0.75rem 1.5rem;
  margin-top: 1rem;
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-muted);
  backdrop-filter: blur(5px);
}

.controls-hint span {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.controls-hint kbd {
  background: #1a1f26;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  font-family: monospace;
  font-weight: 700;
  color: var(--primary);
  font-size: 0.8rem;
}

#boost-indicator {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--primary), var(--yellow));
  color: var(--dark-bg);
  padding: 0.5rem 1.5rem;
  border-radius: 30px;
  font-weight: 700;
  font-size: 0.9rem;
  display: none;
  z-index: 100;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.9; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
}

#goal-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(8px);
  z-index: 60;
  animation: goalPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes goalPop {
  0% {
    transform: scale(0.5) rotate(-10deg);
    opacity: 0;
  }
  100% {
    transform: scale(1) rotate(0);
    opacity: 1;
  }
}

.goal-text {
  font-family: 'Poppins', sans-serif;
  font-size: 5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--yellow), var(--primary));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-transform: uppercase;
  animation: goalShake 0.3s infinite alternate;
}

@keyframes goalShake {
  from { transform: translateX(-5px); }
  to { transform: translateX(5px); }
}

#goal-scorer {
  font-size: 1.2rem;
  color: var(--text);
  margin-top: 1rem;
}

#result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.98);
  backdrop-filter: blur(20px);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2rem;
  z-index: 200;
  animation: fadeInUp 0.5s ease;
}

.result-winner {
  font-family: 'Poppins', sans-serif;
  font-size: 3rem;
  font-weight: 800;
  text-align: center;
  background: linear-gradient(135deg, var(--primary), var(--yellow));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.result-score {
  font-size: 4rem;
  font-weight: 800;
  color: var(--text);
  text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
}

.result-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 40px;
  padding: 1rem 3rem;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--dark-bg);
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Poppins', sans-serif;
}

.result-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
}
</style>
</head>
<body>

<div id="lobby">
  <div class="logo">
    <h1>FUTLOCO</h1>
    <p>⚽ 1V1 ONLINE</p>
  </div>

  <div class="card" id="config-card">
    <div class="card-title">CONFIGURAÇÃO</div>
    <div class="field-group">
      <label>NOME DO JOGADOR</label>
      <input type="text" id="inp-name" placeholder="SEU NOME" maxlength="12" value="JOGADOR">
    </div>
    <div class="field-group">
      <label>COR DO UNIFORME</label>
      <div class="color-pick" id="color-pick">
        <div class="color-swatch active" data-color="#ff4757" style="background:#ff4757"></div>
        <div class="color-swatch" data-color="#5f27cd" style="background:#5f27cd"></div>
        <div class="color-swatch" data-color="#00d2d3" style="background:#00d2d3"></div>
        <div class="color-swatch" data-color="#ffa502" style="background:#ffa502"></div>
        <div class="color-swatch" data-color="#2ed573" style="background:#2ed573"></div>
      </div>
    </div>
    <button class="btn" id="btn-play">JOGAR AGORA</button>
  </div>

  <div class="card" id="cj-card" style="display:none">
    <div class="card-title">SALA DE JOGO</div>
    <button class="btn" id="btn-create">CRIAR NOVA SALA</button>
    <div class="divider">OU</div>
    <div class="field-group">
      <label>CÓDIGO DA SALA</label>
      <input type="text" id="inp-code" placeholder="XXXX" maxlength="4" style="text-align:center;font-size:1.5rem;letter-spacing:0.5em;text-transform:uppercase">
    </div>
    <button class="btn btn-secondary" id="btn-join">ENTRAR NA SALA</button>
  </div>

  <div class="card" id="wait-card" style="display:none">
    <div class="card-title">AGUARDANDO OPONENTE</div>
    <div class="room-code-display" id="disp-code">----</div>
    <button class="btn btn-secondary" id="btn-copy">COPIAR CÓDIGO</button>
  </div>
</div>

<div id="game">
  <div class="scoreboard-modern">
    <div class="player-name" id="sb-name1">Jogador 1</div>
    <div class="score-value" id="sb-score">0 — 0</div>
    <div class="player-name" id="sb-name2">Jogador 2</div>
  </div>
  <div class="game-clock" id="sb-time">3:00</div>

  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="boost-indicator">⚡ SPRINT ATIVADO</div>
    <div id="goal-overlay">
      <div class="goal-text">GOOOOL!</div>
      <div id="goal-scorer"></div>
    </div>
  </div>

  <div class="controls-hint">
    <span>🎮 JOGADOR 1: <kbd>WASD</kbd> + <kbd>ESP</kbd> + <kbd>SHIFT</kbd></span>
    <span>🎮 JOGADOR 2: <kbd>←↑↓→</kbd> + <kbd>ENTER</kbd> + <kbd>SHIFT</kbd></span>
  </div>
</div>

<div id="result-overlay">
  <div class="result-winner" id="res-winner"></div>
  <div class="result-score" id="res-score"></div>
  <button class="result-btn" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
  storageBucket: "futebol-7df3e.firebasestorage.app",
  messagingSenderId: "705698542572",
  appId: "1:705698542572:web:3460d33b213c8a366ac6c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CANVAS_W = 820, CANVAS_H = 460, GAME_DURATION = 180;
let myRole = null, roomCode = '', myName = '', myColor = '#ff4757';

const phys = {
  p1: { x: 150, y: CANVAS_H/2, vx:0, vy:0, r:20, score:0, name:'', color:'#ff4757' },
  p2: { x: CANVAS_W-150, y: CANVAS_H/2, vx:0, vy:0, r:20, score:0, name:'', color:'#5f27cd' },
  ball: { x: CANVAS_W/2, y: CANVAS_H/2, vx:0, vy:0, r:13 },
  time: GAME_DURATION,
  phase: 'playing'
};

const myInput = { left:false, right:false, up:false, down:false, kick:false, sprint:false };

let canvas, ctx, lastTs = 0, lastBroadcast = 0;

const BASE_SPEED = 280;
const SPRINT_SPEED = 500;
const PLAYER_FRICTION = 0.85;
const BALL_FRICTION = 0.98;
const KICK_FORCE = 560;
const GOAL_W = 14, GOAL_H = 130, GOAL_Y = (CANVAS_H - GOAL_H)/2;
const BALL_MAGNET = 0.25;

function applyMovement(p, inp, speed, dt) {
  let ax = 0, ay = 0;
  if (inp.left) ax -= 1;
  if (inp.right) ax += 1;
  if (inp.up) ay -= 1;
  if (inp.down) ay += 1;

  if (ax || ay) {
    const len = Math.hypot(ax, ay) || 1;
    ax /= len; ay /= len;
    p.vx += ax * speed * dt * 5.5;
    p.vy += ay * speed * dt * 5.5;
  }

  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.vx *= PLAYER_FRICTION;
  p.vy *= PLAYER_FRICTION;

  if (inp.kick) {
    const b = phys.ball;
    const dx = b.x - p.x, dy = b.y - p.y;
    const dist = Math.hypot(dx, dy) || 1;
    if (dist < 65) {
      const f = inp.sprint ? KICK_FORCE * 1.4 : KICK_FORCE;
      b.vx += (dx / dist) * f;
      b.vy += (dy / dist) * f;
    }
    inp.kick = false;
  }

  p.x = Math.max(p.r, Math.min(CANVAS_W - p.r, p.x));
  p.y = Math.max(p.r, Math.min(CANVAS_H - p.r, p.y));
}

function updatePhysics(dt) {
  const p1in = myRole === 'p1' ? myInput : (phys.p1._remoteInput || {});
  const p2in = myRole === 'p2' ? myInput : (phys.p2._remoteInput || {});

  applyMovement(phys.p1, p1in, p1in.sprint ? SPRINT_SPEED : BASE_SPEED, dt);
  applyMovement(phys.p2, p2in, p2in.sprint ? SPRINT_SPEED : BASE_SPEED, dt);

  const b = phys.ball;
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  b.vx *= BALL_FRICTION;
  b.vy *= BALL_FRICTION;

  [phys.p1, phys.p2].forEach(p => {
    const dx = b.x - p.x;
    const dy = b.y - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 55 && dist > 5) {
      const nx = dx / dist;
      const ny = dy / dist;
      b.vx += nx * BALL_MAGNET * 100;
      b.vy += ny * BALL_MAGNET * 100;
    }
  });

  if ((b.x < GOAL_W && b.y > GOAL_Y && b.y < GOAL_Y + GOAL_H && b.x < 0)) scoreGoal('p2');
  if ((b.x > CANVAS_W - GOAL_W && b.y > GOAL_Y && b.y < GOAL_Y + GOAL_H && b.x > CANVAS_W)) scoreGoal('p1');

  if (b.y - b.r < 0 || b.y + b.r > CANVAS_H) {
    b.y = Math.max(b.r, Math.min(CANVAS_H - b.r, b.y));
    b.vy *= -0.7;
  }

  document.getElementById('boost-indicator').style.display = myInput.sprint ? 'flex' : 'none';
}

function scoreGoal(scorer) {
  phys[scorer].score++;
  const overlay = document.getElementById('goal-overlay');
  document.getElementById('goal-scorer').textContent = `${phys[scorer].name || scorer} MARCOU!`;
  overlay.style.display = 'flex';

  setTimeout(() => {
    resetPositions();
    overlay.style.display = 'none';
  }, 2000);
}

function resetPositions() {
  phys.p1.x = 150; phys.p1.y = CANVAS_H/2; phys.p1.vx = phys.p1.vy = 0;
  phys.p2.x = CANVAS_W-150; phys.p2.y = CANVAS_H/2; phys.p2.vx = phys.p2.vy = 0;
  phys.ball.x = CANVAS_W/2; phys.ball.y = CANVAS_H/2; phys.ball.vx = phys.ball.vy = 0;
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let i = 0; i < 16; i++) {
    ctx.fillRect(i * (CANVAS_W/16), 0, CANVAS_W/16, CANVAS_H);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H);
  ctx.fillRect(CANVAS_W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);

  ctx.fillStyle = '#f0f0f0';
  ctx.shadowBlur = 10;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.arc(phys.ball.x, phys.ball.y, phys.ball.r, 0, Math.PI*2);
  ctx.fill();
  
  ctx.shadowBlur = 0;

  [phys.p1, phys.p2].forEach((p, i) => {
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px "Poppins"';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 0;
    ctx.fillText(i === 0 ? '⚡' : '💪', p.x, p.y + 8);
  });
}

function updateSB() {
  document.getElementById('sb-name1').textContent = phys.p1.name || 'Jogador 1';
  document.getElementById('sb-name2').textContent = phys.p2.name || 'Jogador 2';
  document.getElementById('sb-score').textContent = `${phys.p1.score} — ${phys.p2.score}`;

  const t = Math.max(0, Math.ceil(phys.time));
  document.getElementById('sb-time').textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
}

document.getElementById('btn-play').onclick = () => {
  myName = (document.getElementById('inp-name').value.trim().toUpperCase() || "JOGADOR").slice(0,12);
  document.getElementById('config-card').style.display = 'none';
  document.getElementById('cj-card').style.display = 'block';
};

document.getElementById('color-pick').onclick = e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  myColor = sw.dataset.color;
};

async function createRoom() {
  roomCode = Math.random().toString(36).slice(2,6).toUpperCase();
  myRole = 'p1';
  phys.p1.name = myName;
  phys.p1.color = myColor;

  await set(ref(db, `futloco/${roomCode}`), { p1: { name: myName, color: myColor }, p2: null, phase: 'waiting', state: null });

  document.getElementById('cj-card').style.display = 'none';
  document.getElementById('wait-card').style.display = 'block';
  document.getElementById('disp-code').textContent = roomCode;

  onValue(ref(db, `futloco/${roomCode}/p2`), snap => {
    const d = snap.val();
    if (d && d.name) {
      phys.p2.name = d.name;
      phys.p2.color = d.color || '#5f27cd';
      startGame();
    }
  });
}

async function joinRoom() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length !== 4) return;
  myRole = 'p2';
  phys.p2.name = myName;
  phys.p2.color = myColor;

  await update(ref(db, `futloco/${code}`), { p2: { name: myName, color: myColor }, phase: 'playing' });
  roomCode = code;

  onValue(ref(db, `futloco/${code}/state`), snap => {
    if (snap.val()) applyServerState(snap.val());
  });
  startGame();
}

function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  canvas = document.getElementById('gc');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  ctx = canvas.getContext('2d');

  setupInput();

  if (myRole === 'p1') {
    onValue(ref(db, `futloco/${roomCode}/p2input`), s => { if (s.val()) phys.p2._remoteInput = s.val(); });
    gameLoop();
  } else {
    gameLoopP2();
  }
}

function setupInput() {
  window.addEventListener('keydown', e => {
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') myInput.sprint = true;
    if (e.code === 'Space' || e.code === 'Enter') myInput.kick = true;

    if (myRole === 'p1') {
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') myInput.left = true;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') myInput.right = true;
      if (e.code === 'KeyW' || e.code === 'ArrowUp') myInput.up = true;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') myInput.down = true;
    } else {
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') myInput.left = true;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') myInput.right = true;
      if (e.code === 'KeyW' || e.code === 'ArrowUp') myInput.up = true;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') myInput.down = true;
    }
  });

  window.addEventListener('keyup', () => {
    myInput.sprint = false;
    myInput.kick = false;
    myInput.left = myInput.right = myInput.up = myInput.down = false;
  });
}

function gameLoop(ts = 0) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (phys.phase === 'playing') {
    updatePhysics(dt);
    phys.time = Math.max(0, phys.time - dt);
    if (phys.time <= 0) endGame();
  }

  draw();
  updateSB();

  const now = Date.now();
  if (now - lastBroadcast > 80) {
    lastBroadcast = now;
    broadcastState();
  }

  requestAnimationFrame(gameLoop);
}

function gameLoopP2(ts = 0) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  updatePhysics(dt);
  draw();
  updateSB();

  const now = Date.now();
  if (now - lastBroadcast > 80) {
    lastBroadcast = now;
    update(ref(db, `futloco/${roomCode}/p2input`), { ...myInput });
  }

  requestAnimationFrame(gameLoopP2);
}

function applyServerState(st) {
  if (!st) return;
  phys.p1.x = phys.p1.x * 0.7 + (st.p1x || phys.p1.x) * 0.3;
  phys.p1.y = phys.p1.y * 0.7 + (st.p1y || phys.p1.y) * 0.3;
  phys.p2.x = phys.p2.x * 0.7 + (st.p2x || phys.p2.x) * 0.3;
  phys.p2.y = phys.p2.y * 0.7 + (st.p2y || phys.p2.y) * 0.3;
  phys.ball.x = st.bx || phys.ball.x;
  phys.ball.y = st.by || phys.ball.y;
  phys.p1.score = st.s1 ?? phys.p1.score;
  phys.p2.score = st.s2 ?? phys.p2.score;
  phys.time = st.time ?? phys.time;
}

function broadcastState() {
  update(ref(db, `futloco/${roomCode}/state`), {
    p1x: phys.p1.x, p1y: phys.p1.y,
    p2x: phys.p2.x, p2y: phys.p2.y,
    bx: phys.ball.x, by: phys.ball.y,
    s1: phys.p1.score, s2: phys.p2.score,
    time: phys.time
  });
}

function endGame() {
  const ov = document.getElementById('result-overlay');
  document.getElementById('res-winner').innerHTML = phys.p1.score > phys.p2.score ? `🏆 ${phys.p1.name} VENCEU!` : phys.p2.score > phys.p1.score ? `🏆 ${phys.p2.name} VENCEU!` : 'EMPATE!';
  document.getElementById('res-score').textContent = `${phys.p1.score} — ${phys.p2.score}`;
  ov.style.display = 'flex';
}

document.getElementById('btn-create').onclick = createRoom;
document.getElementById('btn-join').onclick = joinRoom;
document.getElementById('btn-copy').onclick = () => navigator.clipboard.writeText(roomCode).then(() => alert('Código copiado!'));
</script>
</body>
</html>
