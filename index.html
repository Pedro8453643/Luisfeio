<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTLOCO Pro — 1v1 Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;600&display=swap');

:root {
  --grass-dark: #1a5c1a;
  --grass-light: #247a24;
  --yellow: #f5d000;
  --bg: #0f0f0f;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: #fff; font-family: 'Teko', sans-serif; overflow: hidden; }

/* LAYOUT LOBBY */
#lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
.card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1 { font-family: 'Bebas Neue'; font-size: 5rem; color: var(--yellow); margin-bottom: 0; line-height: 0.8; }
input { width: 100%; padding: 12px; margin: 15px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 1.2rem; text-align: center; }
.btn { width: 100%; padding: 12px; background: var(--yellow); border: none; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 1.5rem; cursor: pointer; transition: 0.2s; color: #000; }
.btn:hover { transform: scale(1.03); filter: brightness(1.1); }

/* JOGO */
#game-ui { display: none; flex-direction: column; align-items: center; width: 100vw; padding-top: 10px; }
.sb { display: flex; justify-content: space-around; width: 780px; background: #111; padding: 10px; border-radius: 10px 10px 0 0; border: 2px solid #333; border-bottom: none; }
.score { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--yellow); }
canvas { background: var(--grass-dark); border: 4px solid #333; border-radius: 0 0 10px 10px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

#goal-alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Bebas Neue'; font-size: 8rem; color: var(--yellow); text-shadow: 0 0 30px #000; display: none; z-index: 10; pointer-events: none; }
</style>
</head>
<body>

<div id="lobby">
  <h1>FUTLOCO</h1>
  <div class="card" id="step1">
    <input type="text" id="nick" placeholder="SEU NICK" maxlength="10">
    <button class="btn" onclick="goToStep2()">PRÓXIMO</button>
  </div>
  <div class="card" id="step2" style="display:none">
    <button class="btn" onclick="createRoom()">CRIAR SALA</button>
    <input type="text" id="room-input" placeholder="CÓDIGO">
    <button class="btn" style="background:#444; color:#fff" onclick="joinRoom()">ENTRAR</button>
  </div>
  <div class="card" id="step-wait" style="display:none">
    <p>CÓDIGO DA SALA:</p>
    <h2 id="room-display" style="font-size:3rem; color:var(--yellow)">----</h2>
    <p>AGUARDANDO OPONENTE...</p>
  </div>
</div>

<div id="game-ui">
  <div class="sb">
    <div id="n1" style="width:200px">P1</div>
    <div class="score" id="score-text">0 - 0</div>
    <div id="n2" style="width:200px; text-align:right">P2</div>
  </div>
  <canvas id="gc"></canvas>
  <p style="margin-top:10px; color:#666">WASD para mover | SHIFT para Correr</p>
</div>

<div id="goal-alert">GOOOOL!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
  storageBucket: "futebol-7df3e.firebasestorage.app",
  messagingSenderId: "705698542572",
  appId: "1:705698542572:web:3460d33b213c8a366ac6c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Configurações Técnicas
const W = 780, H = 440, FPS = 60;
let myRole = '', roomCode = '', myNick = '';
let canvas = document.getElementById('gc'), ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const state = {
  p1: { x: 150, y: 220, r: 18, s: 0, nick: '' },
  p2: { x: 630, y: 220, r: 18, s: 0, nick: '' },
  ball: { x: 390, y: 220, vx: 0, vy: 0, r: 10 },
  goal: false
};

const keys = {};
const p1In = { up:0, down:0, left:0, right:0, shift:0 };
const p2In = { up:0, down:0, left:0, right:0, shift:0 };

// --- LÓGICA DE INTERFACE ---
window.goToStep2 = () => {
  myNick = document.getElementById('nick').value.toUpperCase() || 'PLAYER';
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'flex';
};

window.createRoom = async () => {
  roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
  myRole = 'p1';
  state.p1.nick = myNick;
  await set(ref(db, `fut/${roomCode}`), { state, p1In, p2In });
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step-wait').style.display = 'block';
  document.getElementById('room-display').textContent = roomCode;
  
  onValue(ref(db, `fut/${roomCode}/p2In`), s => { if(s.val()) Object.assign(p2In, s.val()); });
  onValue(ref(db, `fut/${roomCode}/p2Nick`), s => { if(s.val()) { state.p2.nick = s.val(); initGame(); }});
};

window.joinRoom = async () => {
  roomCode = document.getElementById('room-input').value.toUpperCase();
  myRole = 'p2';
  update(ref(db, `fut/${roomCode}`), { p2Nick: myNick });
  onValue(ref(db, `fut/${roomCode}/p1In`), s => { if(s.val()) Object.assign(p1In, s.val()); });
  onValue(ref(db, `fut/${roomCode}/state`), s => { if(s.val()) Object.assign(state, s.val()); });
  initGame();
};

function initGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-ui').style.display = 'flex';
  window.addEventListener('keydown', e => keys[e.code] = true);
  window.addEventListener('keyup', e => keys[e.code] = false);
  setInterval(loop, 1000/FPS);
}

// --- FÍSICA (SOMENTE P1) ---
function runPhysics() {
  if (myRole !== 'p1' || state.goal) return;

  const handleMove = (p, input) => {
    const spd = input.shift ? 6 : 3.5;
    if (input.up) p.y -= spd; if (input.down) p.y += spd;
    if (input.left) p.x -= spd; if (input.right) p.x += spd;
    p.x = Math.max(p.r, Math.min(W - p.r, p.x));
    p.y = Math.max(p.r, Math.min(H - p.r, p.y));
  };

  handleMove(state.p1, p1In);
  handleMove(state.p2, p2In);

  // Bola
  state.ball.x += state.ball.vx;
  state.ball.y += state.ball.vy;
  state.ball.vx *= 0.97; state.ball.vy *= 0.97;

  // Rebote Paredes
  if (state.ball.y < state.ball.r || state.ball.y > H - state.ball.r) state.ball.vy *= -1;
  
  // Rebote Laterais (Traves)
  const gY = (H-120)/2;
  if (state.ball.x < state.ball.r || state.ball.x > W - state.ball.r) {
    if (state.ball.y > gY && state.ball.y < gY + 120) {
       // Checa se entrou totalmente
       if(state.ball.x < -10 || state.ball.x > W + 10) triggerGoal(state.ball.x < W/2 ? 'p2' : 'p1');
    } else {
      state.ball.vx *= -1;
      state.ball.x = state.ball.x < W/2 ? state.ball.r : W - state.ball.r;
    }
  }

  // Colisão Jogador-Bola
  [state.p1, state.p2].forEach(p => {
    const dx = state.ball.x - p.x, dy = state.ball.y - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist < p.r + state.ball.r) {
      const ang = Math.atan2(dy, dx);
      const force = 10;
      state.ball.vx = Math.cos(ang) * force;
      state.ball.vy = Math.sin(ang) * force;
    }
  });

  update(ref(db, `fut/${roomCode}/state`), state);
}

function triggerGoal(winner) {
  state.goal = true;
  state[winner].s++;
  document.getElementById('goal-alert').style.display = 'block';
  setTimeout(() => {
    state.ball = { x: 390, y: 220, vx: 0, vy: 0, r: 10 };
    state.p1.x = 150; state.p1.y = 220;
    state.p2.x = 630; state.p2.y = 220;
    state.goal = false;
    document.getElementById('goal-alert').style.display = 'none';
  }, 2000);
}

// --- RENDERIZAÇÃO ---
function draw() {
  // 1. Gramado com textura
  for(let i=0; i<W; i+=60) {
    ctx.fillStyle = (i/60)%2==0 ? '#247a24' : '#1e6b1e';
    ctx.fillRect(i, 0, 60, H);
  }
  // Linhas
  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.lineWidth = 3;
  ctx.strokeRect(5, 5, W-10, H-10);
  ctx.beginPath(); ctx.arc(W/2, H/2, 60, 0, Math.PI*2); ctx.stroke();
  ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();

  // 2. Gols (Textura de rede)
  ctx.fillStyle = "#111";
  const gY = (H-120)/2;
  ctx.fillRect(0, gY, 15, 120); // Gol Esq
  ctx.fillRect(W-15, gY, 15, 120); // Gol Dir
  
  // 3. Bola
  ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // 4. Jogadores
  drawPlayer(state.p1, '#e84040');
  drawPlayer(state.p2, '#3a6fe8');
}

function drawPlayer(p, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.font = "14px Arial"; ctx.textAlign = "center";
  ctx.fillText(p.nick, p.x, p.y - 25);
}

function loop() {
  const currentIn = {
    up: keys['KeyW'] || keys['ArrowUp'] ? 1:0,
    down: keys['KeyS'] || keys['ArrowDown'] ? 1:0,
    left: keys['KeyA'] || keys['ArrowLeft'] ? 1:0,
    right: keys['KeyD'] || keys['ArrowRight'] ? 1:0,
    shift: keys['ShiftLeft'] || keys['ShiftRight'] ? 1:0
  };
  update(ref(db, `fut/${roomCode}/${myRole}In`), currentIn);
  
  if(myRole === 'p1') runPhysics();
  draw();
  document.getElementById('score-text').textContent = `${state.p1.s} - ${state.p2.s}`;
  document.getElementById('n1').textContent = state.p1.nick;
  document.getElementById('n2').textContent = state.p2.nick;
}
</script>
</body>
</html>
