<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTLOCO — Futebol 1v1 Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;600;700&display=swap');

:root {
  --grass: #1e6b1e;
  --grass2: #1a5c1a;
  --white: #f0f4e8;
  --yellow: #f5d000;
  --p1color: #e84040;
  --p2color: #3a6fe8;
  --dark: #0a0a0a;
  --panel: #1a1a1a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  color: var(--white);
  font-family: 'Teko', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* LOBBY */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.8rem;
  animation: fadeIn .6s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.logo-wrap { text-align: center; }
.logo-wrap h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 12vw, 7rem);
  color: var(--yellow);
  letter-spacing: .1em;
  text-shadow: 6px 6px 0 #a38a00, 0 0 60px rgba(245,208,0,.6);
}
.logo-wrap .tagline {
  font-size: 1.3rem;
  color: #aaa;
  letter-spacing: .35em;
  text-transform: uppercase;
  margin-top: -12px;
}

.card {
  background: var(--panel);
  border: 2px solid #333;
  border-radius: 16px;
  padding: 2rem 2.5rem;
  width: min(400px, 94vw);
  box-shadow: 0 15px 35px rgba(0,0,0,0.7);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--p1color), var(--yellow), var(--p2color));
}

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: .15em;
  color: #ccc;
  margin-bottom: 1.5rem;
  text-align: center;
}

.field-group { margin-bottom: 1.5rem; }
.field-group label {
  display: block;
  font-size: .95rem;
  color: #aaa;
  letter-spacing: .1em;
  margin-bottom: .5rem;
}
.field-group input {
  width: 100%;
  background: #111;
  border: 2px solid #444;
  border-radius: 10px;
  color: #fff;
  font-family: 'Teko', sans-serif;
  font-size: 1.4rem;
  padding: .8rem 1rem;
  outline: none;
  transition: all .2s;
}
.field-group input:focus { border-color: var(--yellow); box-shadow: 0 0 0 4px rgba(245,208,0,.25); }

.color-pick {
  display: flex;
  gap: .8rem;
  flex-wrap: wrap;
  margin-top: .5rem;
}
.color-swatch {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all .25s;
  box-shadow: 0 4px 12px rgba(0,0,0,.5);
}
.color-swatch.active,
.color-swatch:hover {
  transform: scale(1.3);
  border-color: #fff;
}

.btn {
  width: 100%;
  background: linear-gradient(90deg, var(--yellow), #ffed4d);
  border: none;
  border-radius: 12px;
  color: #111;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: .15em;
  padding: 1rem;
  cursor: pointer;
  font-weight: 700;
  transition: all .2s;
  margin-top: .5rem;
}
.btn:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(245,208,0,.5); }
.btn:active { transform: scale(.96); }

/* GAME */
#game { display: none; flex-direction: column; align-items: center; width: 100vw; }

.scoreboard {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: min(780px, 98vw);
  padding: .8rem 1.5rem;
  background: rgba(10,10,10,.95);
  border-bottom: 4px solid #222;
  backdrop-filter: blur(10px);
}

.sb-player {
  display: flex;
  align-items: center;
  gap: .8rem;
  font-size: 1.5rem;
  font-weight: 700;
}
.sb-player.p2 { flex-direction: row-reverse; }

.player-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  box-shadow: 0 0 12px currentColor;
}

.sb-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.4rem;
  letter-spacing: .2em;
  color: var(--yellow);
}

.sb-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: #ddd;
}

#canvas-wrap {
  position: relative;
  width: min(780px, 98vw);
  box-shadow: 0 0 50px rgba(0,0,0,.85);
}

canvas#gc {
  display: block;
  width: 100%;
  background: var(--grass);
  border: 5px solid #111;
  border-radius: 10px;
}

/* BOOST INDICATOR (SHIFT) */
#boost-indicator {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(245,208,0,.95);
  color: #111;
  padding: 6px 22px;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: bold;
  display: none;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(245,208,0,.6);
  letter-spacing: .05em;
}

/* CONTROLS */
.controls-hint {
  width: min(780px,98vw);
  padding: .8rem 1.5rem;
  background: #111;
  font-size: 1.05rem;
  color: #888;
  display: flex;
  justify-content: space-between;
  border-top: 2px solid #222;
}

/* MOBILE */
#mobile-controls {
  display: none;
  width: min(780px,98vw);
  padding: 1rem;
  background: #0a0a0a;
  justify-content: space-between;
  gap: 8px;
}
@media (max-width: 700px) { #mobile-controls { display: flex; } }
.mob-btn {
  flex: 1;
  background: #222;
  border: 2px solid #444;
  border-radius: 12px;
  color: #ddd;
  font-size: 1.5rem;
  padding: 1.1rem .5rem;
  cursor: pointer;
}
.mob-btn:active { background: #444; transform: scale(.95); }
#mb-kick { flex: 1.8; background: #3a2a00; border-color: #f5d000; color: #f5d000; }

/* OVERLAYS */
#goal-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,.75);
  z-index: 50;
  animation: goalPop .4s ease;
}
@keyframes goalPop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
.goal-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5.5rem;
  color: var(--yellow);
  text-shadow: 0 0 40px rgba(245,208,0,.9);
}
#result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.96);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.5rem;
  z-index: 200;
}
.result-winner {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.5rem;
  text-align: center;
}
.result-score {
  font-size: 3.8rem;
  color: #ddd;
}
.result-btn {
  background: var(--yellow);
  color: #111;
  border: none;
  border-radius: 12px;
  padding: 1rem 3rem;
  font-size: 1.6rem;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo-wrap">
    <h1>FUTLOCO</h1>
    <p class="tagline">FUTEBOL 1V1 ONLINE</p>
  </div>

  <div class="card" id="config-card">
    <p class="card-title">// SEU PERFIL</p>

        <div class="color-swatch" data-color="#3a6fe8" style="background:#3a6fe8"></div>
        <div class="color-swatch" data-color="#27ae60" style="background:#27ae60"></div>

</div>

<!-- GAME -->
<div id="game">
  <div class="scoreboard">
    <div class="sb-player p1">
      <div class="player-dot" id="dot-p1"></div>
      <span id="sb-name1">P1</span>
    </div>
    <div style="text-align:center">
      <div class="sb-score" id="sb-score">0 — 0</div>

</div>

<div id="notif"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
  storageBucket: "futebol-7df3e.firebasestorage.app",
  messagingSenderId: "705698542572",
  appId: "1:705698542572:web:3460d33b213c8a366ac6c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ────────────────────────────────────────────
// CONFIGURAÇÕES DO JOGO
// ────────────────────────────────────────────
const CANVAS_W = 780;
const CANVAS_H = 440;
const GAME_DURATION = 180;

let myRole = null;
let roomCode = '';
let myName = '';
let myColor = '#e84040';

const phys = {
  p1: { x: 140, y: CANVAS_H/2, vx:0, vy:0, r:19, score:0, name:'P1', color:'#e84040', kick:false },
  p2: { x: CANVAS_W-140, y: CANVAS_H/2, vx:0, vy:0, r:19, score:0, name:'P2', color:'#3a6fe8', kick:false },
  ball: { x: CANVAS_W/2, y: CANVAS_H/2, vx:0, vy:0, r:12 },
  time: GAME_DURATION,
  phase: 'playing',
  lastGoal: null,
  tick: 0
};

const myInput = { left:false, right:false, up:false, down:false, kick:false, sprint:false };

let canvas, ctx;
let lastTs = 0;
let inputBroadcastTimer = 0;

// ────────────────────────────────────────────
// FÍSICA MELHORADA + SPRINT (SHIFT)
// ────────────────────────────────────────────
const BASE_SPEED = 265;
const SPRINT_SPEED = 465;
const PLAYER_FRICTION = 0.81;
const BALL_FRICTION = 0.976;
const KICK_FORCE = 520;
const GOAL_W = 12;
const GOAL_H = 110;
const GOAL_Y = (CANVAS_H - GOAL_H) / 2;

function applyMovement(p, inp, speed, dt) {
  let ax = 0, ay = 0;
  if (inp.left) ax -= 1;
  if (inp.right) ax += 1;
  if (inp.up) ay -= 1;
  if (inp.down) ay += 1;

  if (ax !== 0 || ay !== 0) {
    const len = Math.hypot(ax, ay);
    ax /= len;
    ay /= len;
    p.vx += ax * speed * dt * 5.2;
    p.vy += ay * speed * dt * 5.2;
  }

  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.vx *= PLAYER_FRICTION;
  p.vy *= PLAYER_FRICTION;

  // KICK
  if (inp.kick) {
    const ball = phys.ball;
    const dx = ball.x - p.x;
    const dy = ball.y - p.y;
    const dist = Math.hypot(dx, dy) || 1;
    if (dist < p.r + ball.r + 28) {
      const force = inp.sprint ? KICK_FORCE * 1.3 : KICK_FORCE;
      ball.vx += (dx / dist) * force;
      ball.vy += (dy / dist) * force;
    }
    inp.kick = false;
  }

  // Clamp
  p.x = Math.max(p.r, Math.min(CANVAS_W - p.r, p.x));
  p.y = Math.max(p.r, Math.min(CANVAS_H - p.r, p.y));
}

function updatePhysics(dt) {
  const p1 = phys.p1;
  const p2 = phys.p2;
  const ball = phys.ball;

  const p1in = myRole === 'p1' ? myInput : (p1._remoteInput || {});
  const p2in = myRole === 'p2' ? myInput : (p2._remoteInput || {});

  const speed1 = p1in.sprint ? SPRINT_SPEED : BASE_SPEED;
  const speed2 = p2in.sprint ? SPRINT_SPEED : BASE_SPEED;

  applyMovement(p1, p1in, speed1, dt);
  applyMovement(p2, p2in, speed2, dt);

  // Ball
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;
  ball.vx *= BALL_FRICTION;
  ball.vy *= BALL_FRICTION;

  // Paredes verticais (cima/baixo)
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -0.7; }
  if (ball.y + ball.r > CANVAS_H) { ball.y = CANVAS_H - ball.r; ball.vy *= -0.7; }

  // GOLS
  const inGoalY = (y) => y > GOAL_Y && y < GOAL_Y + GOAL_H;
  if (ball.x - ball.r < GOAL_W) {
    if (inGoalY(ball.y)) {
      if (ball.x < -ball.r) { scoreGoal('p2'); return; }
    } else {
      ball.x = GOAL_W + ball.r; ball.vx *= -0.7;
    }
  }
  if (ball.x + ball.r > CANVAS_W - GOAL_W) {
    if (inGoalY(ball.y)) {
      if (ball.x > CANVAS_W + ball.r) { scoreGoal('p1'); return; }
    } else {
      ball.x = CANVAS_W - GOAL_W - ball.r; ball.vx *= -0.7;
    }
  }

  // Colisão bola × jogador
  [p1, p2].forEach(p => {
    const dx = ball.x - p.x;
    const dy = ball.y - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist < p.r + ball.r && dist > 0) {
      const nx = dx / dist;
      const ny = dy / dist;
      ball.x = p.x + nx * (p.r + ball.r);
      ball.y = p.y + ny * (p.r + ball.r);
      const rel = (ball.vx - p.vx) * nx + (ball.vy - p.vy) * ny;
      if (rel < 0) {
        ball.vx -= rel * nx * 1.45;
        ball.vy -= rel * ny * 1.45;
      }
    }
  });

  // Colisão jogador × jogador
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const dist = Math.hypot(dx, dy);
  if (dist < p1.r + p2.r && dist > 0) {
    const nx = dx / dist;
    const push = (p1.r + p2.r - dist) * 0.6;
    p1.x -= nx * push;
    p1.y -= nx * push * (dy/dx || 0);
    p2.x += nx * push;
    p2.y += nx * push * (dy/dx || 0);
  }

  // Boost indicator
  const boostEl = document.getElementById('boost-indicator');
  boostEl.style.display = myInput.sprint ? 'block' : 'none';
}

// ────────────────────────────────────────────
// SCORING + GOAL
// ────────────────────────────────────────────
function scoreGoal(scorer) {
  phys[scorer].score++;
  phys.phase = 'goal';
  phys.lastGoal = scorer;

  const overlay = document.getElementById('goal-overlay');
  document.getElementById('goal-scorer').textContent = (phys[scorer].name || scorer.toUpperCase()) + " MARCOU!";
  overlay.style.display = 'flex';

  broadcastState();

  setTimeout(() => {
    resetPositions();
    phys.phase = 'playing';
    phys.lastGoal = null;
    overlay.style.display = 'none';
    broadcastState();
  }, 2200);
}

function resetPositions() {
  phys.p1.x = 140; phys.p1.y = CANVAS_H/2; phys.p1.vx = phys.p1.vy = 0;
  phys.p2.x = CANVAS_W-140; phys.p2.y = CANVAS_H/2; phys.p2.vx = phys.p2.vy = 0;
  phys.ball.x = CANVAS_W/2; phys.ball.y = CANVAS_H/2; phys.ball.vx = phys.ball.vy = 0;
}

function endGame() {
  phys.phase = 'ended';
  broadcastState();
  const ov = document.getElementById('result-overlay');
  const winner = document.getElementById('res-winner');
  const scoreEl = document.getElementById('res-score');

  if (phys.p1.score > phys.p2.score) {
    winner.innerHTML = `🏆 ${phys.p1.name} VENCEU!`;
    winner.style.color = phys.p1.color;
  } else if (phys.p2.score > phys.p1.score) {
    winner.innerHTML = `🏆 ${phys.p2.name} VENCEU!`;
    winner.style.color = phys.p2.color;
  } else {
    winner.textContent = '🤝 EMPATE!';
    winner.style.color = '#f5d000';
  }
  scoreEl.textContent = `${phys.p1.score} — ${phys.p2.score}`;
  ov.style.display = 'flex';
}

// ────────────────────────────────────────────
// DRAW
// ────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Gramado
  for (let i = 0; i < 13; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#1e6b1e' : '#1a5c1a';
    ctx.fillRect(i * (CANVAS_W/13), 0, CANVAS_W/13, CANVAS_H);
  }

  // Linhas do campo
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 3;
  ctx.strokeRect(GOAL_W+4, 4, CANVAS_W - GOAL_W*2 - 8, CANVAS_H-8);
  ctx.beginPath(); ctx.moveTo(CANVAS_W/2, 0); ctx.lineTo(CANVAS_W/2, CANVAS_H); ctx.stroke();

  // Gols
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H);
  ctx.fillRect(CANVAS_W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.strokeRect(0, GOAL_Y, GOAL_W, GOAL_H);
  ctx.strokeRect(CANVAS_W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);

  // Bola
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#000';
  ctx.fillStyle = '#f5f5dc';
  ctx.beginPath();
  ctx.arc(phys.ball.x, phys.ball.y, phys.ball.r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Jogadores
  [phys.p1, phys.p2].forEach((p, i) => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Bebas Neue';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i === 0 ? '1' : '2', p.x, p.y + 5);
  });
}

function updateSB() {
  document.getElementById('sb-name1').textContent = phys.p1.name;
  document.getElementById('sb-name2').textContent = phys.p2.name;
  document.getElementById('dot-p1').style.background = phys.p1.color;
  document.getElementById('dot-p2').style.background = phys.p2.color;
  document.getElementById('sb-score').textContent = `${phys.p1.score} — ${phys.p2.score}`;

  const t = Math.max(0, Math.ceil(phys.time));
  const m = Math.floor(t / 60);
  const s = t % 60;
  document.getElementById('sb-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

// ────────────────────────────────────────────
// INPUT
// ────────────────────────────────────────────
function setupInput() {
  const isP1 = myRole === 'p1';

  window.addEventListener('keydown', e => {
    if (isP1) {
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') myInput.left = true;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') myInput.right = true;
      if (e.code === 'KeyW' || e.code === 'ArrowUp') myInput.up = true;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') myInput.down = true;
    } else {
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') myInput.left = true;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') myInput.right = true;
      if (e.code === 'KeyW' || e.code === 'ArrowUp') myInput.up = true;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') myInput.down = true;
    }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') myInput.sprint = true;
    if (e.code === 'Space' || e.code === 'Enter') myInput.kick = true;

    if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  });

  window.addEventListener('keyup', e => {
    if (['KeyA','ArrowLeft'].includes(e.code)) myInput.left = false;
    if (['KeyD','ArrowRight'].includes(e.code)) myInput.right = false;
    if (['KeyW','ArrowUp'].includes(e.code)) myInput.up = false;
    if (['KeyS','ArrowDown'].includes(e.code)) myInput.down = false;
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') myInput.sprint = false;
    if (e.code === 'Space' || e.code === 'Enter') myInput.kick = false;
  });
}

function setupMobileButtons() {
  const btns = {
    'mb-left': () => myInput.left = true,
    'mb-right': () => myInput.right = true,
    'mb-up': () => myInput.up = true,
    'mb-down': () => myInput.down = true,
    'mb-kick': () => myInput.kick = true
  };
  Object.keys(btns).forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); btns[id](); });
    el.addEventListener('touchend', () => {
      myInput.left = myInput.right = myInput.up = myInput.down = false;
      if (id === 'mb-kick') myInput.kick = false;
    });
  });
}

// ────────────────────────────────────────────
// LOBBY + FIREBASE
// ────────────────────────────────────────────
function showCreateJoin() {
  myName = (document.getElementById('inp-name').value.trim().toUpperCase() || 'JOGADOR').slice(0,12);
  document.getElementById('config-card').style.display = 'none';
  document.getElementById('cj-card').style.display = 'block';
}

async function createRoom() {
  const code = Math.random().toString(36).slice(2,6).toUpperCase();
  roomCode = code;
  myRole = 'p1';
  phys.p1.name = myName;
  phys.p1.color = myColor;

  const btn = document.getElementById('btn-create');
  btn.textContent = 'CONECTANDO...';
  btn.disabled = true;

  try {
    await set(ref(db, `futloco/${code}`), {
      p1: { name: myName, color: myColor, ready: true },
      p2: null,
      phase: 'waiting',
      state: null,
      p1input: null,
      p2input: null
    });
  } catch(e) {
    btn.textContent = '⊕ CRIAR SALA';
    btn.disabled = false;
    console.error(e);
    return;
  }

  document.getElementById('cj-card').style.display = 'none';
  document.getElementById('wait-card').style.display = 'block';
  document.getElementById('disp-code').textContent = code;

  let gameStarted = false;
  onValue(ref(db, `futloco/${code}/p2`), snap => {
    const p2data = snap.val();
    if (p2data && p2data.name && !gameStarted) {
      gameStarted = true;
      phys.p2.name = p2data.name;
      phys.p2.color = p2data.color || '#3a6fe8';
      startGame();
    }
  });
}

async function joinRoom() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length !== 4) return;

  const btn = document.getElementById('btn-join');
  btn.textContent = 'CONECTANDO...';
  btn.disabled = true;

  try {
    const snap = await get(ref(db, `futloco/${code}`));
    if (!snap.exists()) {
      btn.textContent = 'ENTRAR NA SALA';
      btn.disabled = false;
      return;
    }
    const room = snap.val();
    if (room.phase !== 'waiting') {
      btn.textContent = 'ENTRAR NA SALA';
      btn.disabled = false;
      return;
    }

    roomCode = code;
    myRole = 'p2';
    phys.p1.name = room.p1.name;
    phys.p1.color = room.p1.color;
    phys.p2.name = myName;
    phys.p2.color = myColor;

    await update(ref(db, `futloco/${code}`), {
      p2: { name: myName, color: myColor, ready: true },
      phase: 'playing'
    });
  } catch(e) {
    console.error(e);
    btn.textContent = 'ENTRAR NA SALA';
    btn.disabled = false;
    return;
  }

  onValue(ref(db, `futloco/${roomCode}/state`), snap => {
    const st = snap.val();
    if (st && myRole === 'p2') applyServerState(st);
  });

  startGame();
}

function copyCode() {
  navigator.clipboard.writeText(roomCode);
  const notif = document.getElementById('notif');
  notif.textContent = 'CÓDIGO COPIADO!';
  notif.style.display = 'block';
  setTimeout(() => notif.style.display = 'none', 2000);
}

// ────────────────────────────────────────────
// GAME START + LOOPS
// ────────────────────────────────────────────
function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  canvas = document.getElementById('gc');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  ctx = canvas.getContext('2d');

  updateSB();
  setupInput();
  setupMobileButtons();

  if (myRole === 'p1') {
    onValue(ref(db, `futloco/${roomCode}/p2input`), snap => {
      const inp = snap.val();
      if (inp) phys.p2._remoteInput = inp;
    });
    gameLoop();
  } else {
    gameLoopP2();
  }
}

function gameLoop(ts = 0) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (phys.phase === 'playing') {
    updatePhysics(dt);
    phys.time = Math.max(0, phys.time - dt);
    if (phys.time <= 0) endGame();
  }

  draw();
  updateSB();

  inputBroadcastTimer += dt;
  if (inputBroadcastTimer > 0.05) {
    inputBroadcastTimer = 0;
    broadcastState();
    update(ref(db, `futloco/${roomCode}/p1input`), { ...myInput, ts: Date.now() });
  }

  requestAnimationFrame(gameLoop);
}

function gameLoopP2(ts = 0) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  draw();
  updateSB();

  inputBroadcastTimer += dt;
  if (inputBroadcastTimer > 0.05) {
    inputBroadcastTimer = 0;
    update(ref(db, `futloco/${roomCode}/p2input`), { ...myInput, ts: Date.now() });
  }

  requestAnimationFrame(gameLoopP2);
}

function applyServerState(st) {
  if (!st) return;
  phys.p1.x = st.p1x; phys.p1.y = st.p1y;
  phys.p2.x = st.p2x; phys.p2.y = st.p2y;
  phys.ball.x = st.bx; phys.ball.y = st.by;
  phys.p1.score = st.s1; phys.p2.score = st.s2;
  phys.time = st.time;
  phys.phase = st.phase || 'playing';
  if (st.phase === 'ended') endGame();
}

function broadcastState() {
  update(ref(db, `futloco/${roomCode}/state`), {
    p1x: phys.p1.x, p1y: phys.p1.y,
    p2x: phys.p2.x, p2y: phys.p2.y,
    bx: phys.ball.x, by: phys.ball.y,
    s1: phys.p1.score, s2: phys.p2.score,
    time: phys.time,
    phase: phys.phase,
    ts: Date.now()
  });
}

// ────────────────────────────────────────────
// BOTÕES
// ────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', showCreateJoin);
document.getElementById('btn-create').addEventListener('click', createRoom);
document.getElementById('btn-join').addEventListener('click', joinRoom);
document.getElementById('btn-copy').addEventListener('click', copyCode);

document.getElementById('color-pick').addEventListener('click', e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  myColor = sw.dataset.color;
});
</script>
</body>
