<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTLOCO — Futebol 1v1 Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;600;700&display=swap');

:root {
  --grass: #1e6b1e;
  --grass2: #1a5c1a;
  --yellow: #f5d000;
  --dark: #0a0a0a;
  --panel: #1a1a1a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  color: #f0f4e8;
  font-family: 'Teko', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
  animation: fadeIn 0.6s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:none} }

.logo-wrap h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.8rem, 13vw, 7.5rem);
  color: var(--yellow);
  letter-spacing: 0.08em;
  text-shadow: 6px 6px 0 #a38a00, 0 0 60px rgba(245,208,0,0.7);
}

.card {
  background: var(--panel);
  border: 2px solid #333;
  border-radius: 18px;
  padding: 2.2rem 2.8rem;
  width: min(420px, 94vw);
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

.btn {
  width: 100%;
  background: linear-gradient(90deg, var(--yellow), #ffed4d);
  border: none;
  border-radius: 12px;
  color: #111;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.65rem;
  padding: 1.1rem;
  cursor: pointer;
  font-weight: 700;
  margin-top: 0.8rem;
}
.btn:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(245,208,0,0.5); }

#game { display: none; flex-direction: column; align-items: center; width: 100vw; }

.scoreboard {
  width: min(780px, 98vw);
  padding: 0.8rem 1.5rem;
  background: rgba(10,10,10,0.95);
  border-bottom: 4px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sb-score { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--yellow); }

#canvas-wrap { position: relative; width: min(780px, 98vw); box-shadow: 0 0 50px rgba(0,0,0,0.85); }
canvas#gc { display: block; width: 100%; background: var(--grass); border: 5px solid #111; border-radius: 10px; }

#boost-indicator {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(245,208,0,0.95); color: #111; padding: 6px 24px;
  border-radius: 30px; font-weight: bold; display: none; z-index: 100;
}

#goal-overlay {
  position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
  flex-direction: column; background: rgba(0,0,0,0.78); z-index: 60;
  animation: goalPop 0.5s ease forwards;
}
@keyframes goalPop { 0% { transform: scale(0.3) rotate(-12deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
.goal-text { font-family: 'Bebas Neue', sans-serif; font-size: 6.8rem; color: var(--yellow); text-shadow: 0 0 60px rgba(245,208,0,0.95); animation: goalShake 0.4s infinite alternate; }
@keyframes goalShake { from { transform: translateX(-8px); } to { transform: translateX(8px); } }

#result-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none;
  align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; z-index: 200;
}
.result-btn { background: var(--yellow); color: #111; border: none; border-radius: 12px; padding: 1rem 3.5rem; font-size: 1.7rem; cursor: pointer; }
</style>
</head>
<body>

<div id="lobby">
  <div class="logo-wrap"><h1>FUTLOCO</h1><p style="font-size:1.3rem;color:#aaa;letter-spacing:0.3em;">FUTEBOL 1V1 ONLINE</p></div>

  <div class="card" id="config-card">
    <p class="card-title">// SEU PERFIL</p>
    <div class="field-group" style="margin-bottom:1.5rem">
      <label>APELIDO</label>
      <input type="text" id="inp-name" placeholder="RONALDO" maxlength="12" value="JOGADOR">
    </div>
    <div class="field-group">
      <label>COR DO JOGADOR</label>
      <div class="color-pick" id="color-pick">
        <div class="color-swatch active" data-color="#e84040" style="background:#e84040"></div>
        <div class="color-swatch" data-color="#3a6fe8" style="background:#3a6fe8"></div>
        <div class="color-swatch" data-color="#27ae60" style="background:#27ae60"></div>
        <div class="color-swatch" data-color="#f39c12" style="background:#f39c12"></div>
        <div class="color-swatch" data-color="#9b59b6" style="background:#9b59b6"></div>
      </div>
    </div>
    <button class="btn" id="btn-play">JOGAR ONLINE ⚡</button>
  </div>

  <div class="card" id="cj-card" style="display:none">
    <p class="card-title">// MENU DA SALA</p>
    <button class="btn" id="btn-create">⊕ CRIAR SALA</button>
    <div style="text-align:center;margin:1.4rem 0;color:#666;">OU</div>
    <div class="field-group">
      <label>CÓDIGO DA SALA</label>
      <input type="text" id="inp-code" placeholder="XXXX" maxlength="4" style="text-align:center;font-size:2.5rem;letter-spacing:0.7em;text-transform:uppercase">
    </div>
    <button class="btn" id="btn-join" style="background:#444;color:white;">ENTRAR NA SALA</button>
  </div>

  <div class="card" id="wait-card" style="display:none">
    <p class="card-title">// AGUARDANDO AMIGO</p>
    <div id="disp-code" style="font-size:5rem;letter-spacing:0.8em;color:var(--yellow);text-align:center;margin:1rem 0;">----</div>
    <button class="btn" id="btn-copy">📋 COPIAR CÓDIGO</button>
  </div>
</div>

<div id="game">
  <div class="scoreboard">
    <div><span id="sb-name1"></span></div>
    <div style="text-align:center">
      <div class="sb-score" id="sb-score">0 — 0</div>
      <div id="sb-time" style="font-size:1.4rem;color:#ddd;">3:00</div>
    </div>
    <div style="text-align:right"><span id="sb-name2"></span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="boost-indicator">SHIFT • SPRINT</div>
    <div id="goal-overlay">
      <div class="goal-text">GOOOOL!</div>
      <div id="goal-scorer"></div>
    </div>
  </div>

  <div style="width:min(780px,98vw);padding:0.8rem 1.5rem;background:#111;color:#777;font-size:1.05rem;display:flex;justify-content:space-between;">
    <span>WASD + ESPAÇO + SHIFT</span>
    <span>SETAS + ENTER + SHIFT</span>
  </div>
</div>

<div id="result-overlay">
  <div id="res-winner" style="font-size:5rem;"></div>
  <div id="res-score" style="font-size:3.8rem;color:#ddd;"></div>
  <button class="result-btn" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
  storageBucket: "futebol-7df3e.firebasestorage.app",
  messagingSenderId: "705698542572",
  appId: "1:705698542572:web:3460d33b213c8a366ac6c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CANVAS_W = 780, CANVAS_H = 440, GAME_DURATION = 180;
let myRole = null, roomCode = '', myName = '', myColor = '#e84040';

const phys = {
  p1: { x: 150, y: CANVAS_H/2, vx:0, vy:0, r:20, score:0, name:'', color:'#e84040' },
  p2: { x: CANVAS_W-150, y: CANVAS_H/2, vx:0, vy:0, r:20, score:0, name:'', color:'#3a6fe8' },
  ball: { x: CANVAS_W/2, y: CANVAS_H/2, vx:0, vy:0, r:13 },
  time: GAME_DURATION,
  phase: 'playing'
};

const myInput = { left:false, right:false, up:false, down:false, kick:false, sprint:false };

let canvas, ctx, lastTs = 0, lastBroadcast = 0;

// Física mais estável
const BASE_SPEED = 275;
const SPRINT_SPEED = 485;
const PLAYER_FRICTION = 0.84;
const BALL_FRICTION = 0.979;
const KICK_FORCE = 540;
const GOAL_W = 14, GOAL_H = 120, GOAL_Y = (CANVAS_H - GOAL_H)/2;
const BALL_MAGNET = 0.22;   // teleguiar leve

function applyMovement(p, inp, speed, dt) {
  let ax = 0, ay = 0;
  if (inp.left) ax -= 1;
  if (inp.right) ax += 1;
  if (inp.up) ay -= 1;
  if (inp.down) ay += 1;

  if (ax || ay) {
    const len = Math.hypot(ax, ay) || 1;
    ax /= len; ay /= len;
    p.vx += ax * speed * dt * 5.3;
    p.vy += ay * speed * dt * 5.3;
  }

  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.vx *= PLAYER_FRICTION;
  p.vy *= PLAYER_FRICTION;

  if (inp.kick) {
    const b = phys.ball;
    const dx = b.x - p.x, dy = b.y - p.y;
    const dist = Math.hypot(dx, dy) || 1;
    if (dist < 60) {
      const f = inp.sprint ? KICK_FORCE * 1.4 : KICK_FORCE;
      b.vx += (dx / dist) * f;
      b.vy += (dy / dist) * f;
    }
    inp.kick = false;
  }

  p.x = Math.max(p.r, Math.min(CANVAS_W - p.r, p.x));
  p.y = Math.max(p.r, Math.min(CANVAS_H - p.r, p.y));
}

function updatePhysics(dt) {
  const p1in = myRole === 'p1' ? myInput : (phys.p1._remoteInput || {});
  const p2in = myRole === 'p2' ? myInput : (phys.p2._remoteInput || {});

  applyMovement(phys.p1, p1in, p1in.sprint ? SPRINT_SPEED : BASE_SPEED, dt);
  applyMovement(phys.p2, p2in, p2in.sprint ? SPRINT_SPEED : BASE_SPEED, dt);

  const b = phys.ball;
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  b.vx *= BALL_FRICTION;
  b.vy *= BALL_FRICTION;

  // Teleguiar leve da bola
  [phys.p1, phys.p2].forEach(p => {
    const dx = b.x - p.x;
    const dy = b.y - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 50 && dist > 5) {
      const nx = dx / dist;
      const ny = dy / dist;
      b.vx += nx * BALL_MAGNET * 90;
      b.vy += ny * BALL_MAGNET * 90;
    }
  });

  // Gols
  if ((b.x < GOAL_W && b.y > GOAL_Y && b.y < GOAL_Y + GOAL_H && b.x < 0)) scoreGoal('p2');
  if ((b.x > CANVAS_W - GOAL_W && b.y > GOAL_Y && b.y < GOAL_Y + GOAL_H && b.x > CANVAS_W)) scoreGoal('p1');

  if (b.y - b.r < 0 || b.y + b.r > CANVAS_H) {
    b.y = Math.max(b.r, Math.min(CANVAS_H - b.r, b.y));
    b.vy *= -0.68;
  }

  document.getElementById('boost-indicator').style.display = myInput.sprint ? 'block' : 'none';
}

function scoreGoal(scorer) {
  phys[scorer].score++;
  const overlay = document.getElementById('goal-overlay');
  document.getElementById('goal-scorer').textContent = (phys[scorer].name || scorer) + " MARCOU!";
  overlay.style.display = 'flex';

  setTimeout(() => {
    resetPositions();
    overlay.style.display = 'none';
  }, 2200);
}

function resetPositions() {
  phys.p1.x = 150; phys.p1.y = CANVAS_H/2; phys.p1.vx = phys.p1.vy = 0;
  phys.p2.x = CANVAS_W-150; phys.p2.y = CANVAS_H/2; phys.p2.vx = phys.p2.vy = 0;
  phys.ball.x = CANVAS_W/2; phys.ball.y = CANVAS_H/2; phys.ball.vx = phys.ball.vy = 0;
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  for (let i = 0; i < 14; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#1e6b1e' : '#1a5c1a';
    ctx.fillRect(i * (CANVAS_W/14), 0, CANVAS_W/14, CANVAS_H);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H);
  ctx.fillRect(CANVAS_W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);

  ctx.fillStyle = '#f5f5dc';
  ctx.beginPath();
  ctx.arc(phys.ball.x, phys.ball.y, phys.ball.r, 0, Math.PI*2);
  ctx.fill();

  [phys.p1, phys.p2].forEach((p, i) => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Bebas Neue';
    ctx.textAlign = 'center';
    ctx.fillText(i === 0 ? '1' : '2', p.x, p.y + 7);
  });
}

function updateSB() {
  document.getElementById('sb-name1').textContent = phys.p1.name;
  document.getElementById('sb-name2').textContent = phys.p2.name;
  document.getElementById('sb-score').textContent = `${phys.p1.score} — ${phys.p2.score}`;

  const t = Math.max(0, Math.ceil(phys.time));
  document.getElementById('sb-time').textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
}

// ====================== LOBBY + FIREBASE ======================
document.getElementById('btn-play').onclick = () => {
  myName = (document.getElementById('inp-name').value.trim().toUpperCase() || "JOGADOR").slice(0,12);
  document.getElementById('config-card').style.display = 'none';
  document.getElementById('cj-card').style.display = 'block';
};

document.getElementById('color-pick').onclick = e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  myColor = sw.dataset.color;
};

async function createRoom() {
  roomCode = Math.random().toString(36).slice(2,6).toUpperCase();
  myRole = 'p1';
  phys.p1.name = myName;
  phys.p1.color = myColor;

  await set(ref(db, `futloco/${roomCode}`), { p1: { name: myName, color: myColor }, p2: null, phase: 'waiting', state: null });

  document.getElementById('cj-card').style.display = 'none';
  document.getElementById('wait-card').style.display = 'block';
  document.getElementById('disp-code').textContent = roomCode;

  onValue(ref(db, `futloco/${roomCode}/p2`), snap => {
    const d = snap.val();
    if (d && d.name) {
      phys.p2.name = d.name;
      phys.p2.color = d.color || '#3a6fe8';
      startGame();
    }
  });
}

async function joinRoom() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length !== 4) return;
  myRole = 'p2';
  phys.p2.name = myName;
  phys.p2.color = myColor;

  await update(ref(db, `futloco/${code}`), { p2: { name: myName, color: myColor }, phase: 'playing' });
  roomCode = code;

  onValue(ref(db, `futloco/${code}/state`), snap => {
    if (snap.val()) applyServerState(snap.val());
  });
  startGame();
}

function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  canvas = document.getElementById('gc');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  ctx = canvas.getContext('2d');

  setupInput();

  if (myRole === 'p1') {
    onValue(ref(db, `futloco/${roomCode}/p2input`), s => { if (s.val()) phys.p2._remoteInput = s.val(); });
    gameLoop();
  } else {
    gameLoopP2();
  }
}

function setupInput() {
  window.addEventListener('keydown', e => {
    if (['ShiftLeft','ShiftRight'].includes(e.code)) myInput.sprint = true;
    if (['Space','Enter'].includes(e.code)) myInput.kick = true;

    const keysP1 = myRole === 'p1';
    if (keysP1) {
      if (['KeyA','ArrowLeft'].includes(e.code)) myInput.left = true;
      if (['KeyD','ArrowRight'].includes(e.code)) myInput.right = true;
      if (['KeyW','ArrowUp'].includes(e.code)) myInput.up = true;
      if (['KeyS','ArrowDown'].includes(e.code)) myInput.down = true;
    } else {
      if (['KeyA','ArrowLeft'].includes(e.code)) myInput.left = true;
      if (['KeyD','ArrowRight'].includes(e.code)) myInput.right = true;
      if (['KeyW','ArrowUp'].includes(e.code)) myInput.up = true;
      if (['KeyS','ArrowDown'].includes(e.code)) myInput.down = true;
    }
  });

  window.addEventListener('keyup', () => {
    myInput.sprint = false;
    myInput.kick = false;
    myInput.left = myInput.right = myInput.up = myInput.down = false;
  });
}

function gameLoop(ts = 0) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (phys.phase === 'playing') {
    updatePhysics(dt);
    phys.time = Math.max(0, phys.time - dt);
    if (phys.time <= 0) endGame();
  }

  draw();
  updateSB();

  const now = Date.now();
  if (now - lastBroadcast > 80) {   // ← chave para reduzir tremor
    lastBroadcast = now;
    broadcastState();
  }

  requestAnimationFrame(gameLoop);
}

function gameLoopP2(ts = 0) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  updatePhysics(dt);
  draw();
  updateSB();

  const now = Date.now();
  if (now - lastBroadcast > 80) {
    lastBroadcast = now;
    update(ref(db, `futloco/${roomCode}/p2input`), { ...myInput });
  }

  requestAnimationFrame(gameLoopP2);
}

function applyServerState(st) {
  if (!st) return;
  // Interpolação suave para reduzir tremor
  phys.p1.x = phys.p1.x * 0.7 + (st.p1x || phys.p1.x) * 0.3;
  phys.p1.y = phys.p1.y * 0.7 + (st.p1y || phys.p1.y) * 0.3;

  phys.p2.x = phys.p2.x * 0.78 + (st.p2x || phys.p2.x) * 0.22;
  phys.p2.y = phys.p2.y * 0.78 + (st.p2y || phys.p2.y) * 0.22;

  phys.ball.x = st.bx || phys.ball.x;
  phys.ball.y = st.by || phys.ball.y;
  phys.p1.score = st.s1 ?? phys.p1.score;
  phys.p2.score = st.s2 ?? phys.p2.score;
  phys.time = st.time ?? phys.time;
}

function broadcastState() {
  update(ref(db, `futloco/${roomCode}/state`), {
    p1x: phys.p1.x, p1y: phys.p1.y,
    p2x: phys.p2.x, p2y: phys.p2.y,
    bx: phys.ball.x, by: phys.ball.y,
    s1: phys.p1.score, s2: phys.p2.score,
    time: phys.time
  });
}

function endGame() {
  const ov = document.getElementById('result-overlay');
  document.getElementById('res-winner').innerHTML = phys.p1.score > phys.p2.score ? `🏆 ${phys.p1.name} VENCEU` : phys.p2.score > phys.p1.score ? `🏆 ${phys.p2.name} VENCEU` : 'EMPATE';
  document.getElementById('res-score').textContent = `${phys.p1.score} — ${phys.p2.score}`;
  ov.style.display = 'flex';
}

// Botões
document.getElementById('btn-create').onclick = createRoom;
document.getElementById('btn-join').onclick = joinRoom;
document.getElementById('btn-copy').onclick = () => navigator.clipboard.writeText(roomCode).then(() => alert('Código copiado!'));
</script>
</body>
</html>
