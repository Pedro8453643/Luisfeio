<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTLOCO Elite — 1v1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;600&display=swap');

:root { --y: #f5d000; --g1: #1a5c1a; --g2: #247a24; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #0a0a0a; color: #fff; font-family: 'Teko', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }

/* LOBBY UI */
.card { background: #151515; padding: 2rem; border-radius: 15px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 10px 40px #000; }
h1 { font-family: 'Bebas Neue'; font-size: 4.5rem; color: var(--y); line-height: 0.9; margin-bottom: 1rem; }
input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 1.1rem; text-align: center; }
.btn { width: 100%; padding: 12px; background: var(--y); border: none; border-radius: 5px; font-family: 'Bebas Neue'; font-size: 1.4rem; cursor: pointer; color: #000; }

/* GAME UI */
#game-ui { display: none; flex-direction: column; align-items: center; }
.sb { width: 780px; display: flex; justify-content: space-between; padding: 10px 20px; background: #111; border: 2px solid #333; border-radius: 10px 10px 0 0; font-size: 1.5rem; }
canvas { background: var(--g1); border: 3px solid #333; border-radius: 0 0 10px 10px; cursor: none; }
#goal-txt { position: absolute; top: 50%; font-family: 'Bebas Neue'; font-size: 7rem; color: var(--y); display: none; text-shadow: 3px 3px 0 #000; pointer-events: none; }
</style>
</head>
<body>

<div id="lobby">
  <div class="card" id="step1">
    <h1>FUTLOCO</h1>
    <input type="text" id="nick" placeholder="SEU NICK" maxlength="10">
    <button class="btn" onclick="start()">ENTRAR NO CLUB</button>
  </div>
  <div class="card" id="step2" style="display:none">
    <button class="btn" onclick="create()">CRIAR SALA</button>
    <input type="text" id="room-in" placeholder="CÓDIGO">
    <button class="btn" style="background:#333; color:#fff; margin-top:5px" onclick="join()">ENTRAR NA SALA</button>
  </div>
  <div class="card" id="step-wait" style="display:none">
    <p>CÓDIGO:</p>
    <h2 id="room-code-dis" style="font-size:3rem; color:var(--y)">----</h2>
    <p>AGUARDANDO ADVERSÁRIO...</p>
  </div>
</div>

<div id="game-ui">
  <div class="sb">
    <span id="n1">P1</span>
    <span style="color:var(--y); font-weight:bold" id="score">0 - 0</span>
    <span id="n2">P2</span>
  </div>
  <canvas id="gc"></canvas>
  <div id="goal-txt">GOOOOL!</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const W = 780, H = 440;
let myRole = '', roomCode = '', myNick = '', frameCount = 0;
const cv = document.getElementById('gc'), ctx = cv.getContext('2d');
cv.width = W; cv.height = H;

const state = {
  p1: { x: 150, y: 220, r: 18, s: 0, nick: '' },
  p2: { x: 630, y: 220, r: 18, s: 0, nick: '' },
  ball: { x: 390, y: 220, vx: 0, vy: 0, r: 10 },
  goal: false
};

const keys = {};
const p1In = { u:0, d:0, l:0, r:0, s:0 };
const p2In = { u:0, d:0, l:0, r:0, s:0 };

window.start = () => {
  myNick = document.getElementById('nick').value || 'PLAYER';
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
};

window.create = async () => {
  roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
  myRole = 'p1'; state.p1.nick = myNick;
  await set(ref(db, `f/${roomCode}`), { state, p1In, p2In });
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step-wait').style.display = 'block';
  document.getElementById('room-code-dis').textContent = roomCode;
  
  onValue(ref(db, `f/${roomCode}/p2In`), s => { if(s.val()) Object.assign(p2In, s.val()); });
  onValue(ref(db, `f/${roomCode}/p2N`), s => { if(s.val()) { state.p2.nick = s.val(); run(); }});
};

window.join = async () => {
  roomCode = document.getElementById('room-in').value.toUpperCase();
  myRole = 'p2'; state.p2.nick = myNick;
  update(ref(db, `f/${roomCode}`), { p2N: myNick });
  onValue(ref(db, `f/${roomCode}/p1In`), s => { if(s.val()) Object.assign(p1In, s.val()); });
  onValue(ref(db, `f/${roomCode}/state`), s => { if(s.val()) Object.assign(state, s.val()); });
  run();
};

function run() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-ui').style.display = 'flex';
  window.addEventListener('keydown', e => keys[e.code] = true);
  window.addEventListener('keyup', e => keys[e.code] = false);
  requestAnimationFrame(loop);
}

function physics() {
  if (myRole !== 'p1' || state.goal) return;

  const move = (p, inv) => {
    const spd = inv.s ? 6 : 3.8;
    if (inv.u) p.y -= spd; if (inv.d) p.y += spd;
    if (inv.l) p.x -= spd; if (inv.r) p.x += spd;
    p.x = Math.max(p.r, Math.min(W - p.r, p.x));
    p.y = Math.max(p.r, Math.min(H - p.r, p.y));
  };

  move(state.p1, p1In);
  move(state.p2, p2In);

  state.ball.x += state.ball.vx;
  state.ball.y += state.ball.vy;
  state.ball.vx *= 0.98; state.ball.vy *= 0.98;

  if (state.ball.y < 10 || state.ball.y > H - 10) state.ball.vy *= -1;
  
  const goalY = (H-120)/2;
  if (state.ball.x < 10 || state.ball.x > W - 10) {
    if (state.ball.y > goalY && state.ball.y < goalY + 120) {
       if(state.ball.x < 0 || state.ball.x > W) score(state.ball.x < W/2 ? 'p2' : 'p1');
    } else {
      state.ball.vx *= -1;
      state.ball.x = state.ball.x < W/2 ? 11 : W-11;
    }
  }

  [state.p1, state.p2].forEach(p => {
    const dx = state.ball.x - p.x, dy = state.ball.y - p.y;
    const d = Math.hypot(dx, dy);
    if (d < p.r + 10) {
      const a = Math.atan2(dy, dx);
      state.ball.vx = Math.cos(a) * 11;
      state.ball.vy = Math.sin(a) * 11;
    }
  });

  // OTIMIZAÇÃO: Só envia dados para o Firebase 20 vezes por segundo (a cada 3 frames)
  if (frameCount % 3 === 0) {
    update(ref(db, `f/${roomCode}/state`), state);
  }
}

function score(w) {
  state.goal = true; state[w].s++;
  document.getElementById('goal-txt').style.display = 'block';
  setTimeout(() => {
    state.ball = { x: 390, y: 220, vx: 0, vy: 0, r: 10 };
    state.p1.x = 150; state.p2.x = 630;
    state.goal = false;
    document.getElementById('goal-txt').style.display = 'none';
  }, 1500);
}

function loop() {
  frameCount++;
  const myIn = {
    u: keys['KeyW'] || keys['ArrowUp'] ? 1:0,
    d: keys['KeyS'] || keys['ArrowDown'] ? 1:0,
    l: keys['KeyA'] || keys['ArrowLeft'] ? 1:0,
    r: keys['KeyD'] || keys['ArrowRight'] ? 1:0,
    s: keys['ShiftLeft'] || keys['ShiftRight'] ? 1:0
  };
  
  // Envia input rápido (isso é leve)
  if (frameCount % 2 === 0) {
    update(ref(db, `f/${roomCode}/${myRole}In`), myIn);
  }

  // Atualiza input local para o P1 não sentir lag
  if(myRole === 'p1') {
      Object.assign(p1In, myIn);
      physics();
  } else {
      Object.assign(p2In, myIn);
  }

  draw();
  requestAnimationFrame(loop);
}

function draw() {
  // Campo Listrado
  for(let i=0; i<W; i+=60) {
    ctx.fillStyle = (i/60)%2==0 ? '#1e6b1e' : '#247a24';
    ctx.fillRect(i, 0, 60, H);
  }
  
  // Linhas
  ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, W-20, H-20);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, H/2, 50, 0, Math.PI*2); ctx.stroke();

  // Gols
  ctx.fillStyle = "#111";
  ctx.fillRect(0, (H-120)/2, 10, 120);
  ctx.fillRect(W-10, (H-120)/2, 10, 120);

  // Bola
  ctx.fillStyle = "#fff"; ctx.beginPath();
  ctx.arc(state.ball.x, state.ball.y, 10, 0, Math.PI*2); ctx.fill();

  // P1 e P2
  drawP(state.p1, '#e84040');
  drawP(state.p2, '#3a6fe8');
  
  document.getElementById('score').textContent = `${state.p1.s} - ${state.p2.s}`;
  document.getElementById('n1').textContent = state.p1.nick;
  document.getElementById('n2').textContent = state.p2.nick;
}

function drawP(p, c) {
  ctx.fillStyle = c; ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
}
</script>
</body>
</html>
