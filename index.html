<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTLOCO — Futebol 1v1 Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;600;700&display=swap');

:root {
  --grass: #2d7a2d;
  --grass2: #267326;
  --white: #f0f4e8;
  --yellow: #f5d000;
  --p1color: #e84040;
  --p2color: #3a6fe8;
  --ball: #f5f5dc;
  --dark: #111;
  --panel: #1a1a1a;
  --gold: #f5c800;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0d0d0d;
  color: var(--white);
  font-family: 'Teko', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* ── LOBBY ── */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.4rem;
  animation: fadeIn .5s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

.logo-wrap { text-align: center; }
.logo-wrap h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 6rem);
  color: var(--yellow);
  letter-spacing: .08em;
  line-height: 1;
  text-shadow: 4px 4px 0 #a38a00, 0 0 40px rgba(245,208,0,.4);
}
.logo-wrap .tagline {
  font-size: 1.1rem;
  color: #888;
  letter-spacing: .25em;
  text-transform: uppercase;
}

.ball-icon {
  font-size: 3rem;
  animation: spin 3s linear infinite;
  display: inline-block;
}
@keyframes spin { to{transform:rotate(360deg)} }

.card {
  background: var(--panel);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 1.6rem 2rem;
  width: min(360px, 94vw);
  position: relative;
  overflow: hidden;
}
.card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background: linear-gradient(90deg, var(--p1color), var(--yellow), var(--p2color));
}

.card-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;
  letter-spacing:.1em;
  color:#999;
  margin-bottom:1rem;
}

.field-group { margin-bottom:1rem; }
.field-group label {
  display:block;
  font-size:.85rem;
  color:#888;
  letter-spacing:.1em;
  margin-bottom:.3rem;
}
.field-group input {
  width:100%;
  background:#0d0d0d;
  border:1px solid #333;
  border-radius:6px;
  color:var(--white);
  font-family:'Teko',sans-serif;
  font-size:1.2rem;
  padding:.5rem .8rem;
  outline:none;
  transition:border-color .2s;
  letter-spacing:.05em;
}
.field-group input:focus { border-color: var(--yellow); }

.color-pick { display:flex; gap:.5rem; margin-top:.4rem; }
.color-swatch {
  width:28px; height:28px; border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:transform .15s, border-color .15s;
}
.color-swatch.active, .color-swatch:hover {
  transform:scale(1.2);
  border-color:#fff;
}

.btn {
  display:block;
  width:100%;
  background: var(--yellow);
  border:none;
  border-radius:6px;
  color:#111;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;
  letter-spacing:.12em;
  padding:.6rem;
  cursor:pointer;
  transition:all .15s;
  margin-bottom:.6rem;
}
.btn:hover { background:#ffd900; transform:translateY(-1px); box-shadow:0 4px 20px rgba(245,208,0,.35); }
.btn:active { transform:scale(.98); }
.btn.ghost {
  background:transparent;
  border:1px solid #444;
  color:#aaa;
  font-size:1.1rem;
}
.btn.ghost:hover { border-color:#888; color:#eee; background:transparent; box-shadow:none; }

.divider {
  text-align:center;
  color:#555;
  font-size:.8rem;
  letter-spacing:.2em;
  margin:.2rem 0;
  position:relative;
}
.divider::before,.divider::after {
  content:'';
  position:absolute;
  top:50%; width:38%; height:1px; background:#333;
}
.divider::before{left:0} .divider::after{right:0}

.big-room-code {
  font-family:'Bebas Neue',sans-serif;
  font-size:3.5rem;
  letter-spacing:.4em;
  color:var(--yellow);
  text-align:center;
  text-shadow:0 0 20px rgba(245,208,0,.5);
  margin:.5rem 0;
}
.hint { font-size:.85rem; color:#666; text-align:center; letter-spacing:.05em; }
.blink { animation:blink 1.2s steps(2) infinite; }
@keyframes blink{50%{opacity:.3}}

.error-msg { color:#e84040; font-size:.85rem; text-align:center; margin-top:.3rem; min-height:1.2em; }

/* ── GAME ── */
#game { display:none; flex-direction:column; align-items:center; width:100vw; }

.scoreboard {
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:min(780px, 98vw);
  padding:.4rem .8rem;
  background:#111;
  border-bottom:2px solid #222;
}
.sb-player {
  display:flex;
  align-items:center;
  gap:.5rem;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:.05em;
  min-width:120px;
}
.sb-player.p2 { flex-direction:row-reverse; }
.player-dot {
  width:14px; height:14px; border-radius:50%;
  flex-shrink:0;
}
.sb-score {
  font-family:'Bebas Neue',sans-serif;
  font-size:2.8rem;
  letter-spacing:.1em;
  color:var(--yellow);
  text-align:center;
  line-height:1;
  min-width:80px;
}
.sb-time {
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;
  color:#666;
  text-align:center;
  letter-spacing:.1em;
}

#canvas-wrap {
  position:relative;
  width:min(780px, 98vw);
}

canvas#gc {
  display:block;
  width:100%;
  background:var(--grass);
  border: 2px solid #222;
}

.controls-hint {
  display:flex;
  justify-content:space-between;
  width:min(780px,98vw);
  padding:.35rem .8rem;
  background:#111;
  font-size:.9rem;
  color:#555;
  letter-spacing:.05em;
  border-top: 1px solid #222;
}

/* ── GOAL OVERLAY ── */
#goal-overlay {
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,.6);
  z-index:50;
}
#goal-overlay.show { display:flex; animation:goalPop .3s ease; }
@keyframes goalPop {from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.goal-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,12vw,6rem);
  letter-spacing:.15em;
  color:var(--yellow);
  text-shadow:0 0 60px rgba(245,208,0,.8), 4px 4px 0 #333;
  animation:goalSpin .5s ease;
}
@keyframes goalSpin{from{transform:rotate(-10deg) scale(.8)}to{transform:none}}
.goal-sub { font-size:1.4rem; color:#ccc; letter-spacing:.2em; margin-top:.3rem; }

/* ── RESULT ── */
#result-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1.5rem;
  z-index:200;
}
#result-overlay.show { display:flex; }
.result-winner {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,10vw,5.5rem);
  letter-spacing:.1em;
  color:var(--yellow);
  text-shadow:0 0 60px rgba(245,208,0,.5);
  text-align:center;
}
.result-score {
  font-family:'Bebas Neue',sans-serif;
  font-size:4rem;
  color:#ccc;
  letter-spacing:.3em;
}
.result-btn {
  background:var(--yellow);
  color:#111;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;
  letter-spacing:.12em;
  border:none;
  border-radius:8px;
  padding:.7rem 2.5rem;
  cursor:pointer;
  transition:all .15s;
}
.result-btn:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(245,208,0,.4); }

/* ── NOTIF ── */
#notif {
  position:fixed;
  top:.8rem; left:50%; transform:translateX(-50%);
  background:#1a1a1a;
  border:1px solid var(--yellow);
  color:var(--yellow);
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem;
  letter-spacing:.12em;
  padding:.4rem 1.5rem;
  border-radius:6px;
  z-index:300;
  display:none;
}
#notif.show { display:block; animation:notifAnim 2.8s ease forwards; }
@keyframes notifAnim{0%{opacity:0;top:.3rem}10%,85%{opacity:1;top:.8rem}100%{opacity:0}}

/* ── MOBILE BUTTONS ── */
#mobile-controls {
  display:none;
  width:min(780px,98vw);
  padding:.5rem;
  background:#0d0d0d;
  justify-content:space-between;
  gap:.5rem;
}
@media(max-width:600px){ #mobile-controls{ display:flex; } }
.mob-btn {
  flex:1;
  background:#1e1e1e;
  border:1px solid #333;
  border-radius:8px;
  color:#ccc;
  font-family:'Teko',sans-serif;
  font-size:1.3rem;
  padding:.6rem .3rem;
  cursor:pointer;
  transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
.mob-btn:active { background:#333; }
</style>
</head>
<body>

<!-- ─── LOBBY ─── -->
<div id="lobby">
  <div class="logo-wrap">
    <span class="ball-icon">⚽</span>
    <h1>FUTLOCO</h1>
    <p class="tagline">Futebol 1v1 Online</p>
  </div>

  <!-- Config panel -->
  <div class="card" id="config-card">
    <p class="card-title">// SEU PERFIL</p>
    <div class="field-group">
      <label>APELIDO</label>
      <input type="text" id="inp-name" placeholder="RONALDO" maxlength="12"/>
    </div>
    <div class="field-group">
      <label>COR DO JOGADOR</label>
      <div class="color-pick" id="color-pick">
        <div class="color-swatch active" data-color="#e84040" style="background:#e84040"></div>
        <div class="color-swatch" data-color="#3a6fe8" style="background:#3a6fe8"></div>
        <div class="color-swatch" data-color="#27ae60" style="background:#27ae60"></div>
        <div class="color-swatch" data-color="#f39c12" style="background:#f39c12"></div>
        <div class="color-swatch" data-color="#9b59b6" style="background:#9b59b6"></div>
        <div class="color-swatch" data-color="#1abc9c" style="background:#1abc9c"></div>
        <div class="color-swatch" data-color="#e91e63" style="background:#e91e63"></div>
        <div class="color-swatch" data-color="#ffffff" style="background:#ffffff"></div>
      </div>
    </div>
    <button class="btn" id="btn-play">JOGAR ONLINE ⚡</button>
    <p class="error-msg" id="lobby-err"></p>
  </div>

  <!-- Create/Join panel -->
  <div class="card" id="cj-card" style="display:none">
    <p class="card-title" id="cj-title">// CRIAR OU ENTRAR</p>
    <button class="btn" id="btn-create">⊕ CRIAR SALA</button>
    <div class="divider">OU</div>
    <div class="field-group" style="margin-top:.6rem">
      <label>CÓDIGO DA SALA</label>
      <input type="text" id="inp-code" placeholder="XXXX" maxlength="4"
             style="text-align:center;font-size:2rem;letter-spacing:.4em;text-transform:uppercase"/>
    </div>
    <button class="btn ghost" id="btn-join">→ ENTRAR NA SALA</button>
    <p class="error-msg" id="cj-err"></p>
  </div>

  <!-- Waiting panel -->
  <div class="card" id="wait-card" style="display:none">
    <p class="card-title">// AGUARDANDO AMIGO</p>
    <div class="big-room-code" id="disp-code">----</div>
    <p class="hint">Manda este código pro seu amigo</p>
    <button class="btn" id="btn-copy" style="margin-top:1rem">📋 COPIAR CÓDIGO</button>
    <p class="hint blink" style="margin-top:.5rem">Aguardando conexão...</p>
  </div>
</div>

<!-- ─── GAME ─── -->
<div id="game">
  <div class="scoreboard">
    <div class="sb-player p1">
      <div class="player-dot" id="dot-p1"></div>
      <span id="sb-name1">P1</span>
    </div>
    <div style="text-align:center">
      <div class="sb-score" id="sb-score">0 — 0</div>
      <div class="sb-time" id="sb-time">3:00</div>
    </div>
    <div class="sb-player p2">
      <div class="player-dot" id="dot-p2"></div>
      <span id="sb-name2">P2</span>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="gc"></canvas>

    <div id="goal-overlay">
      <div class="goal-text">⚽ GOOOOL!</div>
      <div class="goal-sub" id="goal-scorer"></div>
    </div>
  </div>

  <div class="controls-hint">
    <span id="ctrl-p1-hint">← WASD + ESPAÇO</span>
    <span id="ctrl-p2-hint">← ↑ ↓ → + ENTER</span>
  </div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <button class="mob-btn" id="mb-left">◀</button>
    <button class="mob-btn" id="mb-up">▲</button>
    <button class="mob-btn" id="mb-down">▼</button>
    <button class="mob-btn" id="mb-right">▶</button>
    <button class="mob-btn" id="mb-kick" style="flex:2;background:#2a2000;border-color:#f5d000;color:#f5d000">⚡ KICK</button>

</div>

<div id="result-overlay">
  <div class="result-winner" id="res-winner">---</div>
  <div class="result-score" id="res-score">0 — 0</div>
  <button class="result-btn" onclick="location.reload()">↺ JOGAR DE NOVO</button>
</div>

<div id="notif" id="notif"></div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
  storageBucket: "futebol-7df3e.firebasestorage.app",
  messagingSenderId: "705698542572",
  appId: "1:705698542572:web:3460d33b213c8a366ac6c9",
  measurementId: "G-RBS8EEQ0WW"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────
const CANVAS_W = 780, CANVAS_H = 440;
const GAME_DURATION = 180; // 3 min in seconds
const GOAL_W = 10, GOAL_H = 110, GOAL_Y = (CANVAS_H - GOAL_H) / 2;

let myRole = null; // 'p1' | 'p2'
let roomCode = '';
let myName = '', myColor = '#e84040';
let pollInterval = null;

// Physics (authoritative on p1's client, broadcast to p2)
const phys = {
  p1: { x: 120, y: CANVAS_H/2, vx:0, vy:0, r:18, score:0, name:'P1', color:'#e84040', kick:false },
  p2: { x: CANVAS_W-120, y: CANVAS_H/2, vx:0, vy:0, r:18, score:0, name:'P2', color:'#3a6fe8', kick:false },
  ball: { x: CANVAS_W/2, y: CANVAS_H/2, vx:0, vy:0, r:11 },
  time: GAME_DURATION,
  phase: 'playing', // playing | goal | ended
  lastGoal: null,
  tick: 0,
};

const keys = {};
let canvas, ctx;
let animId;
let lastTs = 0;
let inputBroadcastTimer = 0;
const myInput = { left:false, right:false, up:false, down:false, kick:false };

// ────────────────────────────────────────────
// LOBBY
// ────────────────────────────────────────────
function showCreateJoin() {
  myName = (document.getElementById('inp-name').value.trim().toUpperCase() || 'JOGADOR').slice(0,12);
  document.getElementById('config-card').style.display = 'none';
  document.getElementById('cj-card').style.display = 'block';
}

async function createRoom() {
  const code = genCode();
  roomCode = code;
  myRole = 'p1';
  phys.p1.name = myName;
  phys.p1.color = myColor;

  const btn = document.getElementById('btn-create');
  btn.textContent = 'CONECTANDO...';
  btn.disabled = true;

  try {
    await set(ref(db, `futloco/${code}`), {
      p1: { name: myName, color: myColor, ready: true },
      p2: null,
      phase: 'waiting',
      state: null,
      p1input: null,
      p2input: null,
    });
  } catch(e) {
    btn.textContent = '⊕ CRIAR SALA';
    btn.disabled = false;
    setErr('cj-err', 'Erro Firebase: ' + e.message);
    console.error(e);
    return;
  }

  document.getElementById('cj-card').style.display = 'none';
  document.getElementById('wait-card').style.display = 'block';
  document.getElementById('disp-code').textContent = code;

  let gameStarted = false;
  onValue(ref(db, `futloco/${code}/p2`), snap => {
    const p2data = snap.val();
    if (p2data && p2data.name && !gameStarted) {
      gameStarted = true;
      phys.p2.name = p2data.name;
      phys.p2.color = p2data.color || '#3a6fe8';
      startGame();
    }
  });
}

async function joinRoom() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length !== 4) { setErr('cj-err','Código inválido!'); return; }

  const btn = document.getElementById('btn-join');
  btn.textContent = 'CONECTANDO...';
  btn.disabled = true;

  try {
    const snap = await get(ref(db, `futloco/${code}`));
    if (!snap.exists()) { setErr('cj-err','Sala não encontrada!'); btn.textContent='→ ENTRAR NA SALA'; btn.disabled=false; return; }
    const room = snap.val();
    if (room.phase !== 'waiting') { setErr('cj-err','Sala já iniciada!'); btn.textContent='→ ENTRAR NA SALA'; btn.disabled=false; return; }

    roomCode = code;
    myRole = 'p2';
    phys.p1.name = room.p1.name;
    phys.p1.color = room.p1.color;
    phys.p2.name = myName;
    phys.p2.color = myColor;

    await update(ref(db, `futloco/${code}`), {
      p2: { name: myName, color: myColor, ready: true },
      phase: 'playing'
    });
  } catch(e) {
    setErr('cj-err', 'Erro Firebase: ' + e.message);
    btn.textContent='→ ENTRAR NA SALA'; btn.disabled=false;
    console.error(e);
    return;
  }

  onValue(ref(db, `futloco/${roomCode}/state`), snap => {
    const st = snap.val();
    if (st && myRole === 'p2') applyServerState(st);
  });

  startGame();
}

function copyCode() {
  navigator.clipboard.writeText(roomCode).catch(()=>{});
  showNotif('Código copiado!');
}

// ────────────────────────────────────────────
// GAME START
// ────────────────────────────────────────────
function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  canvas = document.getElementById('gc');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  ctx = canvas.getContext('2d');

  updateSB();
  setupInput();
  setupMobileButtons();

  if (myRole === 'p1') {
    // p1 is authoritative — runs physics and broadcasts
    onValue(ref(db, `futloco/${roomCode}/p2input`), snap => {
      const inp = snap.val();
      if (inp) {
        phys.p2._remoteInput = inp;
      }
    });
    gameLoop(0);
  } else {
    // p2 sends input, receives state
    gameLoopP2(0);
  }
}

// ────────────────────────────────────────────
// GAME LOOP — P1 (authoritative)
// ────────────────────────────────────────────
function gameLoop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (phys.phase === 'playing') {
    updatePhysics(dt);
    phys.time = Math.max(0, phys.time - dt);
    if (phys.time <= 0 && phys.phase === 'playing') endGame();
  }

  draw();
  updateSB();

  // Broadcast state every ~50ms
  inputBroadcastTimer += dt;
  if (inputBroadcastTimer > 0.05) {
    inputBroadcastTimer = 0;
    broadcastState();

    // Send my input too
    update(ref(db, `futloco/${roomCode}/p1input`), { ...myInput, ts: Date.now() });
  }

  animId = requestAnimationFrame(gameLoop);
}

// ────────────────────────────────────────────
// GAME LOOP — P2 (renderer + input sender)
// ────────────────────────────────────────────
function gameLoopP2(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  draw();
  updateSB();

  // Send input
  inputBroadcastTimer += dt;
  if (inputBroadcastTimer > 0.05) {
    inputBroadcastTimer = 0;
    update(ref(db, `futloco/${roomCode}/p2input`), { ...myInput, ts: Date.now() });
  }

  animId = requestAnimationFrame(gameLoopP2);
}

function applyServerState(st) {
  if (!st) return;
  phys.p1.x = st.p1x; phys.p1.y = st.p1y;
  phys.p2.x = st.p2x; phys.p2.y = st.p2y;
  phys.ball.x = st.bx; phys.ball.y = st.by;
  phys.p1.score = st.s1; phys.p2.score = st.s2;
  phys.time = st.time;
  phys.phase = st.phase || 'playing';
  if (st.phase === 'ended') showResult();
  if (st.goalFlash && !phys._lastGoalFlash) { triggerGoalFlash(st.goalFlash); }
  phys._lastGoalFlash = st.goalFlash;
}

function broadcastState() {
  update(ref(db, `futloco/${roomCode}/state`), {
    p1x: phys.p1.x, p1y: phys.p1.y,
    p2x: phys.p2.x, p2y: phys.p2.y,
    bx: phys.ball.x, by: phys.ball.y,
    s1: phys.p1.score, s2: phys.p2.score,
    time: phys.time,
    phase: phys.phase,
    goalFlash: phys.lastGoal || null,
    ts: Date.now()
  });
}

// ────────────────────────────────────────────
// PHYSICS
// ────────────────────────────────────────────
const SPEED = 230, BALL_FRICTION = 0.985, PLAYER_FRICTION = 0.75;
const KICK_FORCE = 420;

function updatePhysics(dt) {
  const p1 = phys.p1, p2 = phys.p2, ball = phys.ball;

  // P1 input (local keys)
  const p1in = myRole === 'p1' ? myInput : (p1._remoteInput || {});
  const p2in = myRole === 'p2' ? myInput : (phys.p2._remoteInput || {});

  applyInput(p1, p1in, dt);
  applyInput(p2, p2in, dt);

  // Ball physics
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;
  ball.vx *= BALL_FRICTION;
  ball.vy *= BALL_FRICTION;

  // Ball wall bounce
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -.7; }
  if (ball.y + ball.r > CANVAS_H) { ball.y = CANVAS_H - ball.r; ball.vy *= -.7; }

  // Ball left/right walls (not goal)
  const inGoalY = (by) => by > GOAL_Y && by < GOAL_Y + GOAL_H;
  if (ball.x - ball.r < GOAL_W) {
    if (inGoalY(ball.y)) {
      // GOAL for p2!
      if (ball.x < -ball.r) { scoreGoal('p2'); return; }
    } else {
      ball.x = GOAL_W + ball.r; ball.vx *= -.7;
    }
  }
  if (ball.x + ball.r > CANVAS_W - GOAL_W) {
    if (inGoalY(ball.y)) {
      if (ball.x > CANVAS_W + ball.r) { scoreGoal('p1'); return; }
    } else {
      ball.x = CANVAS_W - GOAL_W - ball.r; ball.vx *= -.7;
    }
  }

  // Ball–player collision
  [p1, p2].forEach(p => {
    const dx = ball.x - p.x, dy = ball.y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minD = ball.r + p.r;
    if (dist < minD && dist > 0) {
      const nx = dx/dist, ny = dy/dist;
      ball.x = p.x + nx * minD;
      ball.y = p.y + ny * minD;
      const rel = (ball.vx - p.vx)*nx + (ball.vy - p.vy)*ny;
      if (rel < 0) {
        ball.vx -= rel * nx * 1.4;
        ball.vy -= rel * ny * 1.4;
      }
    }
  });

  // Player–player collision
  {
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minD = p1.r + p2.r;
    if (dist < minD && dist > 0) {
      const nx = dx/dist, ny = dy/dist;
      const push = (minD - dist) * 0.5;
      p1.x -= nx*push; p1.y -= ny*push;
      p2.x += nx*push; p2.y += ny*push;
    }
  }

  // Player wall clamp
  [p1, p2].forEach(p => {
    p.x = clamp(p.x, p.r, CANVAS_W - p.r);
    p.y = clamp(p.y, p.r, CANVAS_H - p.r);
  });
}

function applyInput(p, inp, dt) {
  if (inp.left)  p.vx -= SPEED * dt * 3;
  if (inp.right) p.vx += SPEED * dt * 3;
  if (inp.up)    p.vy -= SPEED * dt * 3;
  if (inp.down)  p.vy += SPEED * dt * 3;

  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.vx *= PLAYER_FRICTION;
  p.vy *= PLAYER_FRICTION;

  // Kick
  if (inp.kick) {
    const ball = phys.ball;
    const dx = ball.x - p.x, dy = ball.y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < p.r + ball.r + 22) {
      const nx = dist > 0 ? dx/dist : 1, ny = dist > 0 ? dy/dist : 0;
      ball.vx += nx * KICK_FORCE;
      ball.vy += ny * KICK_FORCE;
    }
    inp.kick = false;
  }
}

// ────────────────────────────────────────────
// SCORING
// ────────────────────────────────────────────
function scoreGoal(scorer) {
  phys[scorer].score++;
  phys.phase = 'goal';
  phys.lastGoal = scorer;
  broadcastState();
  triggerGoalFlash(scorer);

  setTimeout(() => {
    resetPositions();
    phys.phase = 'playing';
    phys.lastGoal = null;
    broadcastState();
  }, 2500);
}

function triggerGoalFlash(scorer) {
  const overlay = document.getElementById('goal-overlay');
  const scorerName = phys[scorer]?.name || scorer.toUpperCase();
  document.getElementById('goal-scorer').textContent = scorerName + ' MARCOU!';
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2200);
}

function resetPositions() {
  phys.p1.x = 140; phys.p1.y = CANVAS_H/2; phys.p1.vx = 0; phys.p1.vy = 0;
  phys.p2.x = CANVAS_W-140; phys.p2.y = CANVAS_H/2; phys.p2.vx = 0; phys.p2.vy = 0;
  phys.ball.x = CANVAS_W/2; phys.ball.y = CANVAS_H/2; phys.ball.vx = 0; phys.ball.vy = 0;
}

function endGame() {
  phys.phase = 'ended';
  broadcastState();
  showResult();
}

function showResult() {
  cancelAnimationFrame(animId);
  const p1 = phys.p1, p2 = phys.p2;
  const ov = document.getElementById('result-overlay');
  const winner = document.getElementById('res-winner');
  const score = document.getElementById('res-score');

  if (p1.score > p2.score) {
    winner.textContent = '🏆 ' + p1.name + ' VENCEU!';
    winner.style.color = p1.color;
  } else if (p2.score > p1.score) {
    winner.textContent = '🏆 ' + p2.name + ' VENCEU!';
    winner.style.color = p2.color;
  } else {
    winner.textContent = '🤝 EMPATE!';
    winner.style.color = '#f5d000';
  }
  score.textContent = p1.score + ' — ' + p2.score;
  ov.classList.add('show');
}

// ────────────────────────────────────────────
// DRAW
// ────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawField();
  drawGoals();
  drawBall();
  drawPlayer(phys.p1, 'p1');
  drawPlayer(phys.p2, 'p2');
  drawShadow();
}

function drawField() {
  // Grass stripes
  for (let i = 0; i < 13; i++) {
    ctx.fillStyle = i%2===0 ? '#2d7a2d' : '#267326';
    ctx.fillRect(i * (CANVAS_W/13), 0, CANVAS_W/13, CANVAS_H);
  }
  // Lines
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  // Boundary
  ctx.strokeRect(GOAL_W+2, 2, CANVAS_W-GOAL_W*2-4, CANVAS_H-4);
  // Center line
  ctx.beginPath(); ctx.moveTo(CANVAS_W/2, 0); ctx.lineTo(CANVAS_W/2, CANVAS_H); ctx.stroke();
  // Center circle
  ctx.beginPath(); ctx.arc(CANVAS_W/2, CANVAS_H/2, 60, 0, Math.PI*2); ctx.stroke();
  // Center dot
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(CANVAS_W/2, CANVAS_H/2, 4, 0, Math.PI*2); ctx.fill();
  // Penalty areas
  ctx.strokeRect(GOAL_W+2, CANVAS_H/2 - 80, 80, 160);
  ctx.strokeRect(CANVAS_W - GOAL_W - 82, CANVAS_H/2 - 80, 80, 160);
}

function drawGoals() {
  // Left goal
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(0, GOAL_Y, GOAL_W, GOAL_H);
  // Right goal
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(CANVAS_W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
  ctx.strokeRect(CANVAS_W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);

  // Nets (visual)
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  for (let y = GOAL_Y; y < GOAL_Y+GOAL_H; y += 18) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GOAL_W,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CANVAS_W-GOAL_W,y); ctx.lineTo(CANVAS_W,y); ctx.stroke();
  }
}

function drawPlayer(p, role) {
  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(2, p.r*0.7, p.r*0.8, p.r*0.25, 0, 0, Math.PI*2); ctx.fill();

  // Body circle
  ctx.fillStyle = p.color;
  ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2);
  ctx.fill();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.arc(-4, -5, p.r*0.45, 0, Math.PI*2); ctx.fill();

  // Jersey number / letter
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${p.r*0.85}px Bebas Neue, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(role === 'p1' ? '1' : '2', 0, 1);

  ctx.restore();

  // Name tag
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  const tw = ctx.measureText(p.name).width + 10;
  ctx.fillRect(p.x - tw/2, p.y - p.r - 22, tw, 16);
  ctx.fillStyle = p.color;
  ctx.font = `700 12px Teko, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.name, p.x, p.y - p.r - 14);
}

function drawBall() {
  const b = phys.ball;
  ctx.save();
  ctx.translate(b.x, b.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2, b.r*0.65, b.r*0.7, b.r*0.22, 0, 0, Math.PI*2); ctx.fill();

  // Ball
  ctx.fillStyle = '#f0f0dc';
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();

  // Pentagon patches
  ctx.fillStyle = '#222';
  const pts = 5;
  ctx.beginPath();
  for (let i = 0; i < pts; i++) {
    const a = (i/pts)*Math.PI*2 - Math.PI/2;
    const r = b.r*0.38;
    i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawShadow() {
  // Vignette
  const grad = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, CANVAS_H*0.3, CANVAS_W/2, CANVAS_H/2, CANVAS_H*0.75);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

// ────────────────────────────────────────────
// SCOREBOARD
// ────────────────────────────────────────────
function updateSB() {
  const p1 = phys.p1, p2 = phys.p2;
  document.getElementById('sb-name1').textContent = p1.name;
  document.getElementById('sb-name2').textContent = p2.name;
  document.getElementById('dot-p1').style.background = p1.color;
  document.getElementById('dot-p2').style.background = p2.color;
  document.getElementById('sb-score').textContent = p1.score + ' — ' + p2.score;

  const t = Math.max(0, Math.ceil(phys.time));
  const m = Math.floor(t/60), s = t%60;
  document.getElementById('sb-time').textContent = m + ':' + String(s).padStart(2,'0');
}

// ────────────────────────────────────────────
// INPUT
// ────────────────────────────────────────────
function setupInput() {
  const isP1 = myRole === 'p1';

  document.getElementById('ctrl-p1-hint').textContent = isP1 ? '← WASD + ESPAÇO (VOCÊ)' : '← ' + phys.p1.name;
  document.getElementById('ctrl-p2-hint').textContent = !isP1 ? '(VOCÊ) ↑↓←→ + ENTER →' : phys.p2.name + ' →';

  window.addEventListener('keydown', e => {
    if (isP1) {
      if (e.code==='KeyA'||e.code==='ArrowLeft') myInput.left=true;
      if (e.code==='KeyD'||e.code==='ArrowRight') myInput.right=true;
      if (e.code==='KeyW'||e.code==='ArrowUp') myInput.up=true;
      if (e.code==='KeyS'||e.code==='ArrowDown') myInput.down=true;
      if (e.code==='Space'||e.code==='Enter') myInput.kick=true;
    } else {
      if (e.code==='ArrowLeft'||e.code==='KeyA') myInput.left=true;
      if (e.code==='ArrowRight'||e.code==='KeyD') myInput.right=true;
      if (e.code==='ArrowUp'||e.code==='KeyW') myInput.up=true;
      if (e.code==='ArrowDown'||e.code==='KeyS') myInput.down=true;
      if (e.code==='Enter'||e.code==='Space') myInput.kick=true;
    }
    if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  });

  window.addEventListener('keyup', e => {
    if(e.code==='KeyA'||e.code==='ArrowLeft') myInput.left=false;
    if(e.code==='KeyD'||e.code==='ArrowRight') myInput.right=false;
    if(e.code==='KeyW'||e.code==='ArrowUp') myInput.up=false;
    if(e.code==='KeyS'||e.code==='ArrowDown') myInput.down=false;
    if(e.code==='Space'||e.code==='Enter') myInput.kick=false;
  });
}

function setupMobileButtons() {
  const btns = {
    'mb-left':  ()=>{myInput.left=true},
    'mb-right': ()=>{myInput.right=true},
    'mb-up':    ()=>{myInput.up=true},
    'mb-down':  ()=>{myInput.down=true},
    'mb-kick':  ()=>{myInput.kick=true},
  };
  Object.entries(btns).forEach(([id, fn]) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e=>{ e.preventDefault(); fn(); }, {passive:false});
    el.addEventListener('touchend', ()=>{
      myInput.left=myInput.right=myInput.up=myInput.down=false;
      if(id==='mb-kick') myInput.kick=false;
    });
  });
}

// ────────────────────────────────────────────
// COLOR PICKER
// ────────────────────────────────────────────
document.getElementById('color-pick').addEventListener('click', e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  myColor = sw.dataset.color;
});

// ────────────────────────────────────────────
// UTILS
// ────────────────────────────────────────────
function genCode() {
  return Math.random().toString(36).slice(2,6).toUpperCase();
}
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function setErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// Wire all buttons (onclick doesn't work inside ES modules)
document.getElementById('btn-play').addEventListener('click', showCreateJoin);
document.getElementById('btn-create').addEventListener('click', createRoom);
document.getElementById('btn-join').addEventListener('click', joinRoom);
document.getElementById('btn-copy').addEventListener('click', copyCode);
document.querySelector('.result-btn').addEventListener('click', () => location.reload());
</script>
