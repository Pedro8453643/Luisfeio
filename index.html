<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINGPONG LOCO — Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Teko:wght@400;600&display=swap');

:root { --y: #f5d000; --bg: #0a0a0a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: #fff; font-family: 'Teko', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }

.card { background: #151515; padding: 2rem; border-radius: 15px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 10px 40px #000; }
h1 { font-family: 'Bebas Neue'; font-size: 4.5rem; color: var(--y); line-height: 0.9; margin-bottom: 1rem; }
input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 1.1rem; text-align: center; }
.btn { width: 100%; padding: 12px; background: var(--y); border: none; border-radius: 5px; font-family: 'Bebas Neue'; font-size: 1.4rem; cursor: pointer; color: #000; }

#game-ui { display: none; flex-direction: column; align-items: center; }
.sb { width: 800px; display: flex; justify-content: space-around; padding: 10px; font-family: 'Bebas Neue'; font-size: 4rem; color: #fff; }
canvas { background: #000; border: 4px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<div id="lobby">
  <div class="card" id="step1">
    <h1>PINGPONG</h1>
    <input type="text" id="nick" placeholder="SEU NICK" maxlength="10">
    <button class="btn" onclick="start()">ENTRAR</button>
  </div>
  <div class="card" id="step2" style="display:none">
    <button class="btn" onclick="create()">CRIAR SALA</button>
    <input type="text" id="room-in" placeholder="CÓDIGO">
    <button class="btn" style="background:#333; color:#fff; margin-top:5px" onclick="join()">ENTRAR NA SALA</button>
  </div>
  <div class="card" id="step-wait" style="display:none">
    <p>CÓDIGO:</p>
    <h2 id="room-code-dis" style="font-size:3rem; color:var(--y)">----</h2>
    <p>AGUARDANDO...</p>
  </div>
</div>

<div id="game-ui">
  <div class="sb">
    <span id="s1">0</span>
    <span style="color:var(--y)">-</span>
    <span id="s2">0</span>
  </div>
  <canvas id="gc"></canvas>
  <p style="margin-top:10px; color:#555">W / S ou SETAS para mover</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Mantenha sua configuração do Firebase aqui
const firebaseConfig = {
  apiKey: "AIzaSyA2errhulZq6uaSnu9ax4jzIqpKvKX8phA",
  authDomain: "futebol-7df3e.firebaseapp.com",
  databaseURL: "https://futebol-7df3e-default-rtdb.firebaseio.com",
  projectId: "futebol-7df3e",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const W = 800, H = 500;
let myRole = '', roomCode = '', frameCount = 0;
const cv = document.getElementById('gc'), ctx = cv.getContext('2d');
cv.width = W; cv.height = H;

const state = {
  p1: { y: 200, h: 80, w: 15, s: 0 },
  p2: { y: 200, h: 80, w: 15, s: 0 },
  ball: { x: 400, y: 250, vx: 0, vy: 0, r: 8 },
  active: false
};

const keys = {};

window.start = () => {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
};

window.create = async () => {
  roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
  myRole = 'p1';
  resetBall(); // Sorteia direção inicial
  await set(ref(db, `pp/${roomCode}`), { state, p1y: 200, p2y: 200 });
  
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step-wait').style.display = 'block';
  document.getElementById('room-code-dis').textContent = roomCode;
  
  onValue(ref(db, `pp/${roomCode}/p2y`), s => { if(s.val() !== undefined) state.p2.y = s.val(); });
  onValue(ref(db, `pp/${roomCode}/p2Join`), s => { if(s.val()) run(); });
};

window.join = async () => {
  roomCode = document.getElementById('room-in').value.toUpperCase();
  myRole = 'p2';
  update(ref(db, `pp/${roomCode}`), { p2Join: true });
  onValue(ref(db, `pp/${roomCode}/p1y`), s => { if(s.val() !== undefined) state.p1.y = s.val(); });
  onValue(ref(db, `pp/${roomCode}/state`), s => { if(s.val()) Object.assign(state, s.val()); });
  run();
};

function resetBall() {
  state.ball.x = W / 2;
  state.ball.y = H / 2;
  // 50% de chance para cada lado
  const dir = Math.random() < 0.5 ? -1 : 1;
  state.ball.vx = dir * 7;
  state.ball.vy = (Math.random() - 0.5) * 8;
  state.active = true;
}

function physics() {
  if (myRole !== 'p1') return;

  // Movimento da bola
  state.ball.x += state.ball.vx;
  state.ball.y += state.ball.vy;

  // Colisão Teto/Chão
  if (state.ball.y < 0 || state.ball.y > H) state.ball.vy *= -1;

  // Colisão Raquetes
  const checkPaddle = (p, isLeft) => {
    const px = isLeft ? 20 : W - 20 - p.w;
    if (state.ball.x > px && state.ball.x < px + p.w &&
        state.ball.y > p.y && state.ball.y < p.y + p.h) {
      
      // Aumenta velocidade gradualmente
      state.ball.vx *= -1.05; 
      // Adiciona "efeito" dependendo de onde bateu na raquete
      const hitPos = (state.ball.y - (p.y + p.h/2)) / (p.h/2);
      state.ball.vy = hitPos * 7;
      
      // Reposiciona para evitar prender a bola
      state.ball.x = isLeft ? px + p.w + 5 : px - 5;
    }
  };

  checkPaddle(state.p1, true);
  checkPaddle(state.p2, false);

  // Pontuação (Fundo da quadra)
  if (state.ball.x < 0) { state.p2.s++; resetBall(); }
  if (state.ball.x > W) { state.p1.s++; resetBall(); }

  if (frameCount % 3 === 0) {
    update(ref(db, `pp/${roomCode}/state`), state);
  }
}

function run() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-ui').style.display = 'flex';
  window.addEventListener('keydown', e => keys[e.code] = true);
  window.addEventListener('keyup', e => keys[e.code] = false);
  requestAnimationFrame(loop);
}

function loop() {
  frameCount++;
  
  // Movimento local da raquete
  let move = 0;
  if (keys['KeyW'] || keys['ArrowUp']) move = -8;
  if (keys['KeyS'] || keys['ArrowDown']) move = 8;

  if (myRole === 'p1') {
    state.p1.y = Math.max(0, Math.min(H - state.p1.h, state.p1.y + move));
    update(ref(db, `pp/${roomCode}/p1y`), state.p1.y);
    physics();
  } else {
    state.p2.y = Math.max(0, Math.min(H - state.p2.h, state.p2.y + move));
    update(ref(db, `pp/${roomCode}/p2y`), state.p2.y);
  }

  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  // Rede Central
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.setLineDash([10, 10]);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // Raquetes
  ctx.fillStyle = "#fff";
  ctx.fillRect(20, state.p1.y, state.p1.w, state.p1.h);
  ctx.fillRect(W - 20 - state.p2.w, state.p2.y, state.p2.w, state.p2.h);

  // Bola (Ping Pong)
  ctx.beginPath();
  ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI*2);
  ctx.fill();

  // Placar
  document.getElementById('s1').textContent = state.p1.s;
  document.getElementById('s2').textContent = state.p2.s;
}
</script>
</body>
</html>
